<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>통합 근무 플래너</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');

    :root { 
        --blue: #1a3a6d; --pink: #ff85a1; --soft-pink: #fff0f3; --today: #fffde7; 
        --sat: #1e88e5; --sun: #e53935;
        /* 근무별 배경색 */
        --work-ju: #e3f2fd; --work-ya: #ede7f6; --work-suk: #fff9c4; --work-bi: #e8f5e9;
    }
    
    body { font-family: 'Nanum Gothic', sans-serif; background: var(--soft-pink); margin: 0; padding: 10px; overflow-x: hidden; width: 100%; box-sizing: border-box; }

    /* 헤더 및 버튼 스타일 */
    .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(255,133,161,0.1); margin-bottom: 15px; border: 1px solid var(--soft-pink); }
    .year-area { display: flex; align-items: center; white-space: nowrap; font-size: 22px; font-weight: 800; color: var(--blue); }
    .btn-group { display: flex; gap: 5px; align-items: center; }
    .today-btn { padding: 6px 10px; cursor: pointer; background: white; color: var(--pink); border: 2px solid var(--pink); border-radius: 20px; font-weight: bold; font-size: 12px; }
    .pattern-btn { padding: 6px 10px; cursor: pointer; background: var(--blue); color: white; border: none; border-radius: 20px; font-weight: bold; font-size: 12px; }
    .yearly-btn { padding: 6px 10px; cursor: pointer; background: #607d8b; color: white; border: none; border-radius: 20px; font-weight: bold; font-size: 12px; }

    /* 달력 그리드 */
    .calendar-card { background: white; padding: 10px; border-radius: 15px; box-shadow: 0 8px 25px rgba(255,133,161,0.15); border: 2px solid var(--soft-pink); width: 100%; box-sizing: border-box; }
    .grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: minmax(100px, auto); gap: 4px; width: 100%; }
    .day-header { text-align: center; font-weight: bold; padding: 5px; color: var(--pink); font-size: 12px; }
    .day-header:nth-child(1) { color: var(--sun); }
    .day-header:nth-child(7) { color: var(--sat); }

    .day { min-height: 100px; background: white; border: 1px solid #ffeef1; border-radius: 6px; padding: 6px; cursor: pointer; position: relative; font-size: 13px; display: flex; flex-direction: column; }
    .day.today { border: 2px solid var(--pink) !important; background: var(--today) !important; }
    .day.sun .date-num, .holiday-label { color: var(--sun) !important; }
    .day.sat .date-num { color: var(--sat); }
    .date-num { font-weight: bold; margin-bottom: 4px; }

    .holiday-label { font-size: 10px; font-weight: 800; display: block; margin-bottom: 2px; }
    .event-container { display: flex; flex-wrap: wrap; gap: 2px; width: 100%; }
    .event-tag { display: inline-block; padding: 2px 4px; border-radius: 4px; font-size: 10px; line-height: 1.2; width: 100%; box-sizing: border-box; word-break: break-all; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
    .work-tag { font-weight: 800; text-align: center; border: 1px solid rgba(0,0,0,0.1); }

    /* 메모장 (오른쪽 배치) */
    .memo-container { position: fixed; top: 20px; right: 10px; width: 45px; height: 45px; border-radius: 50%; border: 3px solid #b2dfdb; background: #e0f2f1; display: flex; justify-content: center; align-items: center; z-index: 1000; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    .memo-container:not(.active)::before { content: '📝'; font-size: 20px; }
    #memo-area { width: 100%; height: 100%; background: transparent; border: none; font-family: 'Nanum Gothic', sans-serif; font-size: 16px; font-weight: 800; resize: none; outline: none; padding: 15px; box-sizing: border-box; display: none; }
    .memo-container.active { border-radius: 15px; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; height: 350px; padding: 0; }
    .memo-container.active #memo-area { display: block; }

    /* 모달 공통 */
    .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 20px; z-index: 1001; width: 300px; border: 3px solid var(--pink); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(2px); z-index: 999; }
    .add-btn { width: 100%; padding: 12px; background: var(--pink); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

    .nav-control { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 10px 0; }
    .nav-btn { padding: 8px 16px; cursor: pointer; background: var(--pink); color: white; border: none; border-radius: 8px; font-weight: bold; }

    @media (max-width: 768px) {
        .grid { grid-template-columns: repeat(7, 1fr); gap: 1px; }
        .day { min-height: 90px; padding: 3px; }
        .event-tag { font-size: 9px; letter-spacing: -1px; }
        .year-area { font-size: 18px; }
    }
</style>
</head>
<body>
    <div class="header">
        <div class="year-area"><span id="display-year"></span>년</div>
        <div class="btn-group">
            <button class="today-btn" onclick="goToday()">오늘</button>
            <button class="pattern-btn" onclick="openPatternModal()">패턴</button>
            <button class="yearly-btn" onclick="openYearlyView()">연간</button>
        </div>
        <div class="memo-container" onclick="toggleMemo(event)"><textarea id="memo-area" placeholder="메모를 입력하세요..."></textarea></div>
    </div>

    <div class="nav-control">
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <span id="month-display" style="font-size: 20px; font-weight: bold; color: var(--blue);"></span>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>

    <div class="calendar-card"><div class="grid" id="calendar-grid"></div></div>
    <div id="overlay" class="overlay" onclick="closeAll()"></div>

    <div id="modal" class="modal">
        <h3 id="modal-date-display" style="text-align: center; margin-bottom:15px;"></h3>
        <div style="font-size: 12px; color: #888; margin-bottom: 5px;">📋 등록된 리스트 (🚩은 근무)</div>
        <div id="modal-list" style="margin-bottom:15px; max-height:150px; overflow-y:auto; border: 1px solid #eee; padding: 8px; border-radius: 10px; background: #fafafa;"></div>
        <input type="text" id="event-input" placeholder="일정 내용을 입력하세요" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; margin-bottom:10px;">
        <div style="display: flex; gap: 8px; justify-content: center; margin-bottom: 15px;">
            <div class="color-btn" onclick="selectColor('#ffdce0', this)" style="background:#ffdce0; width:28px; height:28px; border-radius:50%; cursor:pointer;"></div>
            <div class="color-btn" onclick="selectColor('#e3f2fd', this)" style="background:#e3f2fd; width:28px; height:28px; border-radius:50%; cursor:pointer;"></div>
            <div class="color-btn" onclick="selectColor('#ede7f6', this)" style="background:#ede7f6; width:28px; height:28px; border-radius:50%; cursor:pointer;"></div>
            <div class="color-btn" onclick="selectColor('#fff9c4', this)" style="background:#fff9c4; width:28px; height:28px; border-radius:50%; cursor:pointer;"></div>
            <div class="color-btn" onclick="selectColor('#e8f5e9', this)" style="background:#e8f5e9; width:28px; height:28px; border-radius:50%; cursor:pointer;"></div>
        </div>
        <div style="margin-bottom:15px; font-size:14px;"><input type="checkbox" id="is-holiday"> 공휴일(빨간날)로 지정</div>
        <button class="add-btn" onclick="addEvent()">일정 저장</button>
        <button onclick="closeAll()" style="width:100%; margin-top:10px; border:none; background:transparent; color: #999;">닫기</button>
    </div>

    <div id="pattern-modal" class="modal" style="border-color: var(--blue);">
        <h3 style="text-align: center;">교대 패턴 설정</h3>
        <p style="font-size:12px; color:#666; text-align:center;">8일 주기: 주-주-야-숙-비-비-야-숙</p>
        <div style="margin: 20px 0;">
            <div style="margin-bottom:10px;">
                <label>시작 날짜: </label>
                <input type="number" id="pattern-start-day" min="1" max="31" value="1" style="width:60px; padding:5px;"> 일
            </div>
            <div>
                <label>시작 근무: </label>
                <select id="pattern-start-index" style="width:100%; padding:10px; margin-top:5px; border-radius:8px;">
                    <option value="0">1단계: 주간(주)</option>
                    <option value="1">2단계: 주간(주)</option>
                    <option value="2">3단계: 야간(야)</option>
                    <option value="3">4단계: 숙직(숙)</option>
                    <option value="4">5단계: 비번(비)</option>
                    <option value="5">6단계: 비번(비)</option>
                    <option value="6">7단계: 야간(야)</option>
                    <option value="7">8단계: 숙직(숙)</option>
                </select>
            </div>
        </div>
        <button class="add-btn" onclick="applyPattern()" style="background:var(--blue); margin-bottom:8px;">패턴 적용</button>
        <button class="add-btn" onclick="clearMonthPattern()" style="background:var(--sun); border:none;">이 달의 패턴 전체삭제</button>
        <button onclick="closeAll()" style="width:100%; margin-top:10px; border:none; background:transparent; color:#999;">닫기</button>
    </div>

    <div id="yearly-modal" class="modal" style="width:90%; max-width:450px; height:80vh; border-color:#607d8b; display:none; flex-direction:column;">
        <h3 style="text-align:center;">📅 <span id="yearly-title"></span>년 연간 일정</h3>
        <div id="yearly-list-container" style="flex:1; overflow-y:auto; padding:10px; background:#f5f5f5; border-radius:10px;"></div>
        <button class="add-btn" onclick="closeAll()" style="background:#607d8b; margin-top:10px;">닫기</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCjKNiwIuWn1-MhAgsIRz1C5FCa7NTy_5o",
        authDomain: "backgoon-811dc.firebaseapp.com",
        projectId: "backgoon-811dc",
        storageBucket: "backgoon-811dc.firebasestorage.app",
        messagingSenderId: "275172993103",
        appId: "1:275172993103:web:e001d6487f8429d736a23a"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentYear = new Date().getFullYear(), currentMonth = new Date().getMonth();
    let data = {}, selectedDate = "", selectedColor = "#ffdce0", editIndex = null, cachedHolidays = {}, memoTimer;
    const cycle = ["주", "주", "야", "숙", "비", "비", "야", "숙"];
    const cycleColors = { "주": "#e3f2fd", "야": "#ede7f6", "숙": "#fff9c4", "비": "#e8f5e9" };

    // 실시간 데이터 수신
    onSnapshot(doc(db, "work_planner", "data"), (snap) => { if (snap.exists()) { data = snap.data(); renderCalendar(); } });
    onSnapshot(doc(db, "work_planner", "memo"), (snap) => {
        const memoArea = document.getElementById('memo-area');
        if (snap.exists() && memoArea && document.activeElement !== memoArea) { memoArea.value = snap.data().text || ""; }
    });

    async function fetchHolidays(year) {
        if (cachedHolidays[year]) return cachedHolidays[year];
        try {
            const res = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/KR`);
            const hData = await res.json();
            const hMap = {};
            hData.forEach(h => { const d = new Date(h.date); hMap[`${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`] = h.localName; });
            cachedHolidays[year] = hMap; return hMap;
        } catch (e) { return {}; }
    }

    async function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        document.getElementById('display-year').innerText = currentYear;
        document.getElementById('month-display').innerText = `${currentMonth + 1}월`;

        const holidays = await fetchHolidays(currentYear);
        const firstDay = new Date(currentYear, currentMonth, 1).getDay(), lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
        ['일','월','화','수','목','금','토'].forEach(d => grid.innerHTML += `<div class="day-header">${d}</div>`);
        for(let i=0; i<firstDay; i++) grid.innerHTML += `<div class="day"></div>`;

        const now = new Date();
        for(let d=1; d<=lastDate; d++) {
            const dateStr = `${currentYear}-${currentMonth+1}-${d}`, dayOfWeek = new Date(currentYear, currentMonth, d).getDay();
            const userEvents = data[dateStr] || [];
            const holidayName = holidays[dateStr] || (userEvents.find(ev => ev.isHoliday)?.text || '');

            let dayClass = "day";
            if (dayOfWeek === 0 || holidayName) dayClass += " sun";
            if (dayOfWeek === 6) dayClass += " sat";
            if (currentYear === now.getFullYear() && currentMonth === now.getMonth() && d === now.getDate()) dayClass += " today";

            grid.innerHTML += `<div class="${dayClass}" ondblclick="openModal('${dateStr}')">
                <span class="date-num">${d}</span>
                ${holidayName ? `<span class="holiday-label">${holidayName}</span>` : ''}
                <div class="event-container">${userEvents.map(ev => `<span class="event-tag ${ev.isWork ? 'work-tag' : ''}" style="background:${ev.color};">${ev.isWork ? '['+ev.text+']' : ev.text}</span>`).join('')}</div>
            </div>`;
        }
    }

    // --- 교대 패턴 기능 ---
    window.applyPattern = async () => {
        const startDay = parseInt(document.getElementById('pattern-start-day').value);
        const startIndex = parseInt(document.getElementById('pattern-start-index').value);
        const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
        
        let idx = startIndex;
        for (let d = startDay; d <= lastDate; d++) {
            const dateStr = `${currentYear}-${currentMonth+1}-${d}`;
            if (!data[dateStr]) data[dateStr] = [];
            data[dateStr] = data[dateStr].filter(ev => !ev.isWork); // 기존 근무 삭제
            const type = cycle[idx % 8];
            data[dateStr].unshift({ text: type, color: cycleColors[type], isWork: true, isHoliday: false });
            idx++;
        }
        await setDoc(doc(db, "work_planner", "data"), data);
        window.closeAll();
    };

    window.clearMonthPattern = async () => {
        if(!confirm("이 달의 모든 근무 패턴을 삭제하시겠습니까?")) return;
        const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
        for (let d = 1; d <= lastDate; d++) {
            const dateStr = `${currentYear}-${currentMonth+1}-${d}`;
            if (data[dateStr]) data[dateStr] = data[dateStr].filter(ev => !ev.isWork);
        }
        await setDoc(doc(db, "planner_pro", "data"), data);
        window.closeAll();
    };

    // --- 연간 일정 보기 ---
    window.openYearlyView = () => {
        const container = document.getElementById('yearly-list-container');
        document.getElementById('yearly-title').innerText = currentYear;
        container.innerHTML = '';
        for (let m = 1; m <= 12; m++) {
            let monthHtml = '';
            Object.keys(data).sort().forEach(dateStr => {
                const [y, mm, d] = dateStr.split('-').map(Number);
                if (y === currentYear && mm === m && data[dateStr].length > 0) {
                    data[dateStr].forEach(ev => {
                        monthHtml += `<div style="display:flex; padding:5px; border-bottom:1px solid #eee; font-size:13px;">
                            <span style="width:35px; font-weight:bold;">${d}일</span>
                            <span style="flex:1;">${ev.isWork ? '🚩' : ''}${ev.text}</span>
                        </div>`;
                    });
                }
            });
            if (monthHtml) container.innerHTML += `<div style="margin-top:15px; font-weight:bold; color:var(--blue); border-bottom:2px solid var(--blue);">${m}월</div>` + monthHtml;
        }
        document.getElementById('yearly-modal').style.display = 'flex';
        document.getElementById('overlay').style.display = 'block';
    };

    // --- 기본 일정 관리 ---
    window.openModal = (d) => {
        selectedDate = d; editIndex = null;
        document.getElementById('event-input').value = '';
        document.getElementById('modal-date-display').innerText = d;
        document.getElementById('modal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
        window.updateModalList();
    };

    window.updateModalList = () => {
        const div = document.getElementById('modal-list'); div.innerHTML = '';
        const events = [...(data[selectedDate] || [])].sort((a,b) => (b.isWork - a.isWork));
        events.forEach((ev, i) => {
            const originalIdx = data[selectedDate].indexOf(ev);
            div.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; background:${ev.color}; padding:8px; margin-bottom:5px; border-radius:8px;">
                <span onclick="prepareEdit(${originalIdx})" style="cursor:pointer; flex:1;">${ev.isWork ? '🚩 ' : ''}${ev.text}</span>
                <button onclick="deleteEvent(${originalIdx})" style="border:none; background:none; color:red; font-weight:bold;">×</button></div>`;
        });
    };

    window.addEvent = async () => {
        const val = document.getElementById('event-input').value;
        if (!val) return;
        if (!data[selectedDate]) data[selectedDate] = [];
        const ev = { text: val, color: selectedColor, isHoliday: document.getElementById('is-holiday').checked, isWork: false };
        if (editIndex !== null) data[selectedDate][editIndex] = ev; else data[selectedDate].push(ev);
        await setDoc(doc(db, "planner_pro", "data"), data);
        window.closeAll();
    };

    window.deleteEvent = async (i) => { data[selectedDate].splice(i, 1); await setDoc(doc(db, "planner_pro", "data"), data); window.updateModalList(); };
    window.prepareEdit = (i) => { const ev = data[selectedDate][i]; document.getElementById('event-input').value = ev.text; document.getElementById('is-holiday').checked = ev.isHoliday; editIndex = i; };
    window.selectColor = (c, el) => { selectedColor = c; document.querySelectorAll('.color-btn').forEach(b => b.style.border='none'); el.style.border='2px solid black'; };
    window.openPatternModal = () => { document.getElementById('pattern-modal').style.display='block'; document.getElementById('overlay').style.display='block'; };
    window.closeAll = () => { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); document.getElementById('overlay').style.display='none'; document.querySelector('.memo-container').classList.remove('active'); };
    window.changeMonth = (n) => { currentMonth += n; if (currentMonth < 0) { currentMonth=11; currentYear--; } else if (currentMonth>11) { currentMonth=0; currentYear++; } renderCalendar(); };
    window.goToday = () => { const n = new Date(); currentYear=n.getFullYear(); currentMonth=n.getMonth(); renderCalendar(); };
    window.toggleMemo = (e) => { e.stopPropagation(); const mc = document.querySelector('.memo-container'); if(mc.classList.contains('active')) return; mc.classList.add('active'); document.getElementById('overlay').style.display='block'; document.getElementById('memo-area').focus(); };

    // 스와이프
    let tsX = 0;
    document.getElementById('calendar-grid').addEventListener('touchstart', (e) => tsX = e.touches[0].clientX);
    document.getElementById('calendar-grid').addEventListener('touchend', (e) => {
        const teX = e.changedTouches[0].clientX;
        if (tsX - teX > 50) changeMonth(1); else if (teX - tsX > 50) changeMonth(-1);
    });

    document.getElementById('memo-area').addEventListener('input', (e) => {
        clearTimeout(memoTimer);
        memoTimer = setTimeout(() => setDoc(doc(db, "work_planner", "memo"), { text: e.target.value }), 800);
    });

    renderCalendar();
</script>
</body>
</html>
