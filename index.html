<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>승일님의 통합 근무 플래너</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');
        
        :root { 
            --blue: #1a3a6d; --pink: #ff85a1; --soft-pink: #fff0f3; --today: #fffde7; 
            --sat: #1e88e5; --sun: #e53935; --memo-bg: #f9f9f9;
        }

        body { font-family: 'Nanum Gothic', sans-serif; background: var(--soft-pink); margin: 0; padding: 0; }

        /* 3040 홀브 스타일 메인 컨테이너 */
        #main-wrapper { 
            display: flex; 
            flex-direction: column; 
            max-width: 1250px; 
            margin: 0 auto; 
            padding: 15px;
            gap: 20px;
        }

        /* 4번 해결: 상단 헤더 중앙 정렬 */
        .header { 
            display: flex; 
            flex-direction: column;
            align-items: center;
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(255,133,161,0.1); 
            margin-bottom: 10px;
            gap: 10px;
        }

        .year-area { font-size: 24px; font-weight: 800; color: var(--blue); }

        .btn-group { 
            display: flex; 
            justify-content: center;
            gap: 8px; 
        }

        .today-btn, .pattern-btn, .yearly-btn { 
            padding: 8px 16px; cursor: pointer; border-radius: 20px; 
            font-weight: bold; font-size: 13px; border: 2px solid; transition: 0.3s;
        }
        .today-btn { background: white; color: var(--pink); border-color: var(--pink); }
        .pattern-btn { background: var(--blue); color: white; border-color: var(--blue); }
        .yearly-btn { background: #607d8b; color: white; border-color: #607d8b; }

        /* 3040 레이아웃: 달력과 메모장 가로 배치 */
        #content-body { display: flex; flex-direction: column; gap: 20px; }

        #calendar-container { flex: 75; background: white; padding: 15px; border-radius: 15px; border: 2px solid var(--soft-pink); box-shadow: 0 8px 25px rgba(255,133,161,0.1); }
        
        /* 3번 해결: PC 버전 메모장 상시 노출 */
        #memo-area { 
            flex: 25; background: white; border-radius: 15px; border: 2px solid #b2dfdb; 
            display: flex; flex-direction: column; min-height: 400px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative;
        }

        #memo-header { background:#e0f2f1; padding:12px; font-weight:bold; text-align:center; border-radius:12px 12px 0 0; color: #00796b; }
        #memo-content { flex: 1; border: none; resize: none; padding: 15px; font-size: 15px; outline: none; line-height: 1.6; border-radius: 0 0 15px 15px; }

        /* 달력 그리드 */
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .day-header { text-align: center; font-weight: bold; padding: 10px; color: var(--pink); border-bottom: 1px solid var(--soft-pink); }
        .day { background: white; border: 1px solid #ffeef1; border-radius: 6px; padding: 5px; min-height: 100px; cursor: pointer; display: flex; flex-direction: column; }
        .day.today { border: 2px solid var(--pink); background: var(--today); }
        .date-num { font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        
        /* 1, 2번 해결: 공휴일 빨간 굵은 글씨 스타일 */
        .sun .date-num, .holiday-red .date-num { color: var(--sun) !important; font-weight: 800; }
        .sat .date-num { color: var(--sat); }

        /* 일정 태그 */
        .event-tag { display: block; padding: 2px 4px; border-radius: 4px; font-size: 11px; margin-top: 2px; width: 100%; box-sizing: border-box; }
        .work-tag { font-weight: 800; text-align: center; border: 1px solid rgba(0,0,0,0.1); }

        /* 모달 및 오버레이 */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 20px; z-index: 1001; width: 320px; border: 3px solid var(--pink); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; }

        .nav-control { display: flex; align-items: center; justify-content: center; gap: 25px; margin: 10px 0; }
        .nav-btn { padding: 8px 20px; cursor: pointer; background: var(--pink); color: white; border: none; border-radius: 10px; font-weight: bold; }

        /* 반응형 레이아웃 설정 */
        @media (min-width: 1024px) {
            #content-body { flex-direction: row; align-items: flex-start; }
            .header { flex-direction: row; justify-content: space-between; }
            .year-area { margin-left: 20px; }
            .btn-group { margin-right: 20px; }
        }

        @media (max-width: 1023px) {
            #memo-area { 
                position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; 
                min-height: auto; border-radius: 50%; z-index: 1000; overflow: hidden; transition: 0.3s;
            }
            #memo-area:not(.active) #memo-content, #memo-area:not(.active) #memo-header { display: none; }
            #memo-area:not(.active)::before { content: '📝'; line-height: 50px; text-align: center; width: 100%; display: block; font-size: 24px; cursor: pointer; }
            #memo-area.active { width: 90%; height: 70%; bottom: 15%; right: 5%; border-radius: 20px; }
        }
    </style>
</head>
<body>

<div id="main-wrapper">
    <div class="header">
        <div class="year-area"><span id="display-year"></span>년</div>
        <div class="btn-group">
            <button class="today-btn" onclick="goToday()">오늘</button>
            <button class="pattern-btn" onclick="openPatternModal()">패턴</button>
            <button class="yearly-btn" onclick="openYearlyView()">연간</button>
        </div>
    </div>

    <div class="nav-control">
        <button class="nav-btn" onclick="changeMonth(-1)">◀ 이전</button>
        <span id="month-display" style="font-size: 24px; font-weight: 800; color: var(--blue);"></span>
        <button class="nav-btn" onclick="changeMonth(1)">다음 ▶</button>
    </div>

    <div id="content-body">
        <div id="calendar-container">
            <div class="grid" id="calendar-grid"></div>
        </div>

        <div id="memo-area" onclick="toggleMemo(event)">
            <div id="memo-header">실시간 메모장 (3040 스타일)</div>
            <textarea id="memo-content" placeholder="내용을 입력하면 자동 저장됩니다..."></textarea>
        </div>
    </div>
</div>

<div id="overlay" class="overlay" onclick="closeAll()"></div>

<div id="modal" class="modal">
    <h3 id="modal-date-display" style="text-align: center;"></h3>
    <div id="modal-list" style="margin-bottom:15px; max-height:180px; overflow-y:auto; padding:5px; border-radius:10px; background:#f9f9f9;"></div>
    <input type="text" id="event-input" placeholder="할 일 입력" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px; box-sizing:border-box;">
    <div style="display:flex; gap:8px; justify-content:center; margin-bottom:15px;">
        <div class="color-btn" onclick="selectColor('#ffdce0', this)" style="background:#ffdce0; width:30px; height:30px; border-radius:50%; cursor:pointer; border:2px solid black;"></div>
        <div class="color-btn" onclick="selectColor('#e3f2fd', this)" style="background:#e3f2fd; width:30px; height:30px; border-radius:50%; cursor:pointer;"></div>
        <div class="color-btn" onclick="selectColor('#fff9c4', this)" style="background:#fff9c4; width:30px; height:30px; border-radius:50%; cursor:pointer;"></div>
        <div class="color-btn" onclick="selectColor('#e8f5e9', this)" style="background:#e8f5e9; width:30px; height:30px; border-radius:50%; cursor:pointer;"></div>
    </div>
    <label style="display:block; margin-bottom:15px; cursor:pointer; font-size:14px;">
        <input type="checkbox" id="is-holiday"> <span style="color:red; font-weight:bold;">🚩 공휴일(빨간날)로 지정</span>
    </label>
    <button onclick="addEvent()" style="width:100%; padding:12px; background:var(--pink); color:white; border:none; border-radius:10px; font-weight:bold;">저장하기</button>
    <button onclick="closeAll()" style="width:100%; margin-top:10px; border:none; background:transparent; color:#999;">닫기</button>
</div>

<div id="pattern-modal" class="modal" style="border-color:var(--blue);">
    <h3 style="text-align:center;">교대 근무 패턴 생성</h3>
    <div style="margin-bottom:15px; text-align:center;">시작 일자: <input type="number" id="p-day" value="1" min="1" max="31" style="width:50px; padding:5px;"> 일</div>
    <div style="margin-bottom:20px;">
        시작 근무 선택: 
        <select id="p-idx" style="width:100%; padding:10px; border-radius:8px;">
            <option value="0">주간(주) - 1일차</option><option value="1">주간(주) - 2일차</option>
            <option value="2">야간(야)</option><option value="3">숙직(숙)</option>
            <option value="4">비번(비) - 1일차</option><option value="5">비번(비) - 2일차</option>
            <option value="6">야간(야)</option><option value="7">숙직(숙)</option>
        </select>
    </div>
    <button onclick="applyPattern()" style="width:100%; padding:12px; background:var(--blue); color:white; border:none; border-radius:10px; font-weight:bold; margin-bottom:10px;">패턴 적용</button>
    <button onclick="clearMonthPattern()" style="width:100%; padding:12px; background:var(--sun); color:white; border:none; border-radius:10px; font-weight:bold;">이 달의 패턴 삭제</button>
    <button onclick="closeAll()" style="width:100%; margin-top:10px; border:none; background:transparent; color:#999;">닫기</button>
</div>

<div id="yearly-modal" class="modal" style="width:90%; max-width:500px; height:80vh; display:none; flex-direction:column; border-color:#607d8b;">
    <h2 style="text-align:center;">📅 <span id="y-title"></span>년 전체 일정</h2>
    <div id="y-list" style="flex:1; overflow-y:auto; padding:10px; background:#f5f5f5; border-radius:10px;"></div>
    <button onclick="closeAll()" style="width:100%; padding:15px; background:#607d8b; color:white; border:none; border-radius:10px; margin-top:10px;">닫기</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const bdbConfig = {
        apiKey: "AIzaSyCjKNiwIuWn1-MhAgsIRz1C5FCa7NTy_5o",
        authDomain: "backgoon-811dc.firebaseapp.com",
        projectId: "backgoon-811dc",
        storageBucket: "backgoon-811dc.firebasestorage.app",
        messagingSenderId: "275172993103",
        appId: "1:275172993103:web:e001d6487f8429d736a23a"
    };
    
    const app = initializeApp(bdbConfig);
    const db = getFirestore(app);

    let currentYear = new Date().getFullYear(), currentMonth = new Date().getMonth();
    let data = {}, selectedDate = "", selectedColor = "#ffdce0", editIdx = null, memoTimer;
    const cycle = ["주", "주", "야", "숙", "비", "비", "야", "숙"];
    const cycleColors = { "주": "#e3f2fd", "야": "#ede7f6", "숙": "#fff9c4", "비": "#e8f5e9" };

    // 데이터 실시간 감시 (플래너 경로 고정)
    onSnapshot(doc(db, "work_planner", "data"), (snap) => { if (snap.exists()) { data = snap.data(); renderCalendar(); } });
    onSnapshot(doc(db, "work_planner", "memo"), (snap) => {
        const area = document.getElementById('memo-content');
        if (snap.exists() && document.activeElement !== area) area.value = snap.data().text || "";
    });

    async function renderCalendar() {
        const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
        document.getElementById('display-year').innerText = currentYear;
        document.getElementById('month-display').innerText = `${currentMonth + 1}월`;
        
        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
        
        ['일','월','화','수','목','금','토'].forEach(d => grid.innerHTML += `<div class="day-header">${d}</div>`);
        for(let i=0; i<firstDay; i++) grid.innerHTML += `<div></div>`;

        const now = new Date();
        for(let d=1; d<=lastDate; d++) {
            const dateStr = `${currentYear}-${currentMonth+1}-${d}`;
            const dayOfWeek = new Date(currentYear, currentMonth, d).getDay();
            const evs = data[dateStr] || [];
            
            // 1, 2번 해결: 공휴일 여부 체크
            const isHoli = evs.some(e => e.isHoliday);
            
            let cls = "day";
            if (dayOfWeek === 0) cls += " sun";
            if (dayOfWeek === 6) cls += " sat";
            if (isHoli) cls += " holiday-red"; // 빨간 글씨 클래스 추가
            if (currentYear === now.getFullYear() && currentMonth === now.getMonth() && d === now.getDate()) cls += " today";

            grid.innerHTML += `<div class="${cls}" ondblclick="openModal('${dateStr}')">
                <span class="date-num">${d}</span>
                <div class="event-container">${evs.map(e => `<span class="event-tag ${e.isWork ? 'work-tag' : ''}" style="background:${e.color};">${(e.isHoliday ? '🚩 ' : '') + (e.isWork ? '[근무] ' : '') + e.text}</span>`).join('')}</div>
            </div>`;
        }
    }

    // [함수들은 전역 윈도우 객체에 등록]
    window.addEvent = async () => {
        const text = document.getElementById('event-input').value;
        if (!text) return;
        if (!data[selectedDate]) data[selectedDate] = [];
        const newItem = { text, color: selectedColor, isHoliday: document.getElementById('is-holiday').checked, isWork: false };
        if (editIdx !== null) data[selectedDate][editIdx] = newItem;
        else data[selectedDate].push(newItem);
        await setDoc(doc(db, "work_planner", "data"), data);
        closeAll();
    };

    window.applyPattern = async () => {
        const startDay = parseInt(document.getElementById('p-day').value);
        const startIdx = parseInt(document.getElementById('p-idx').value);
        const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
        let idx = startIdx;
        for (let d = startDay; d <= lastDate; d++) {
            const ds = `${currentYear}-${currentMonth+1}-${d}`;
            if (!data[ds]) data[ds] = [];
            data[ds] = data[ds].filter(e => !e.isWork);
            const type = cycle[idx % 8];
            data[ds].unshift({ text: type, color: cycleColors[type], isWork: true, isHoliday: false });
            idx++;
        }
        await setDoc(doc(db, "work_planner", "data"), data);
        closeAll();
    };

    window.openModal = (ds) => {
        selectedDate = ds; editIdx = null;
        const [y, m, d] = ds.split('-');
        document.getElementById('modal-date-display').innerText = `${m}월 ${d}일 일정`;
        document.getElementById('event-input').value = '';
        document.getElementById('is-holiday').checked = false;
        document.getElementById('modal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
        updateModalList();
    };

    window.updateModalList = () => {
        const div = document.getElementById('modal-list'); div.innerHTML = '';
        const evs = data[selectedDate] || [];
        evs.forEach((e, i) => {
            div.innerHTML += `<div style="display:flex; justify-content:space-between; background:${e.color}; padding:8px; margin-bottom:5px; border-radius:8px;">
                <span onclick="prepareEdit(${i})" style="cursor:pointer; flex:1; font-size:13px;">${(e.isHoliday ? '🚩 ' : '') + (e.isWork ? '[근무] ' : '') + e.text}</span>
                <button onclick="deleteEvent(${i})" style="border:none; background:none; color:red; font-weight:bold; cursor:pointer;">×</button>
            </div>`;
        });
    };

    window.openYearlyView = () => {
        const container = document.getElementById('y-list');
        document.getElementById('y-title').innerText = currentYear;
        container.innerHTML = '';
        for (let m = 1; m <= 12; m++) {
            let monthHtml = '';
            Object.keys(data).sort((a,b) => new Date(a) - new Date(b)).forEach(ds => {
                const [y, mm, d] = ds.split('-').map(Number);
                if (y === currentYear && mm === m) {
                    data[ds].forEach(e => {
                        monthHtml += `<div style="display:flex; padding:6px; border-bottom:1px solid #eee; font-size:13px;">
                            <span style="width:40px; font-weight:bold;">${d}일</span>
                            <span style="flex:1; color:${e.isHoliday ? 'red' : 'black'}">${(e.isHoliday ? '🚩 ' : '') + (e.isWork ? '[근무] ' : '') + e.text}</span>
                        </div>`;
                    });
                }
            });
            if (monthHtml) container.innerHTML += `<div style="margin-top:15px; font-weight:bold; color:var(--blue); border-bottom:2px solid var(--blue); padding-bottom:5px;">${m}월</div>` + monthHtml;
        }
        document.getElementById('yearly-modal').style.display = 'flex';
        document.getElementById('overlay').style.display = 'block';
    };

    window.deleteEvent = async (i) => { data[selectedDate].splice(i, 1); await setDoc(doc(db, "work_planner", "data"), data); updateModalList(); };
    window.prepareEdit = (i) => { const e = data[selectedDate][i]; document.getElementById('event-input').value = e.text; document.getElementById('is-holiday').checked = e.isHoliday; editIdx = i; };
    window.changeMonth = (n) => { currentMonth += n; if(currentMonth<0){currentMonth=11; currentYear--;} else if(currentMonth>11){currentMonth=0; currentYear++;} renderCalendar(); };
    window.goToday = () => { const n = new Date(); currentYear=n.getFullYear(); currentMonth=n.getMonth(); renderCalendar(); };
    window.closeAll = () => { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); document.getElementById('overlay').style.display='none'; document.getElementById('memo-area').classList.remove('active'); };
    
    // 모바일 메모장 토글 기능
    window.toggleMemo = (e) => { 
        if(window.innerWidth >= 1024) return; // PC에선 토글 불필요
        e.stopPropagation(); 
        const memo = document.getElementById('memo-area');
        if(!memo.classList.contains('active')) {
            memo.classList.add('active'); 
            document.getElementById('overlay').style.display='block'; 
        }
    };

    window.selectColor = (c, el) => { selectedColor = c; document.querySelectorAll('.color-btn').forEach(b => b.style.border='none'); el.style.border='2px solid black'; };
    window.clearMonthPattern = async () => { if(confirm("이 달의 패턴을 모두 삭제할까요?")) { for(let d=1; d<=31; d++) { const ds = `${currentYear}-${currentMonth+1}-${d}`; if(data[ds]) data[ds] = data[ds].filter(e => !e.isWork); } await setDoc(doc(db, "work_planner", "data"), data); closeAll(); } };
    window.openPatternModal = () => { document.getElementById('pattern-modal').style.display='block'; document.getElementById('overlay').style.display='block'; };

    // 메모 자동 저장
    document.getElementById('memo-content').addEventListener('input', (e) => {
        clearTimeout(memoTimer);
        memoTimer = setTimeout(() => setDoc(doc(db, "work_planner", "memo"), { text: e.target.value }), 800);
    });

    renderCalendar();
</script>
</body>
</html>
