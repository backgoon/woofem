<style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');

    :root { 
        --blue: #1a3a6d; --pink: #ff85a1; --soft-pink: #fff0f3; --today: #fffde7; 
        --mint: #e0f2f1; --sat: #1e88e5; --sun: #e53935; 
    }
    
    body { font-family: 'Nanum Gothic', sans-serif; background: var(--soft-pink); margin: 0; padding: 10px; overflow-x: hidden; width: 100%; box-sizing: border-box; }

    /* 헤더 레이아웃 */
    .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(255,133,161,0.1); margin-bottom: 15px; border: 1px solid var(--soft-pink); }
.calendar-grid {
    display: grid !important;
    grid-template-columns: repeat(7, 12.5% [col-start]) !important; /* 비율을 명확히 고정 */
    /* 혹은 아래 방식이 더 확실합니다 */
    grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr !important;
    width: 100% !important;
    table-layout: fixed !important;
    border-collapse: collapse;
}
    
    /* 칸 안의 내용이 넘쳐도 너비를 건드리지 못하게 설정 */
.day {
    width: 100% !important;
    min-width: 0 !important; /* 내부 글자 때문에 넓어지는 것 방지 */
    overflow: hidden !important; /* 넘치는 글자는 숨기거나 줄바꿈 처리 */
    box-sizing: border-box;
    border: 0.5px solid #eee; /* 칸 구분을 명확히 */
    position: relative;
}
    
    /* 2. 연도와 '년' 글자 크기 맞춤 (CSS 내 .year-area 수정) */
.year-area {
    display: flex;
    align-items: center;
    gap: 2px;
    font-size: 20px !important; /* 전체 크기를 20px로 키움 */
    font-weight: bold;
    color: #333;
}
#display-year { 
    font-size: 20px !important; /* 숫자 크기도 동일하게 20px */
    line-height: 1;
}
    /* .year-area { display: flex; align-items: center; white-space: nowrap; font-size: 28px; font-weight: 800; color: var(--blue); } */

    .pattern-btn { background: var(--blue); color: white; border: 2px solid var(--blue); border-radius: 20px; padding: 5px 12px; font-weight: bold; font-size: 14px; cursor: pointer; margin-left: 5px; } */
    .pattern-btn, .today-btn {
        padding: 4px 10px;
        font-size: 11px;
        height: 28px;
        border-radius: 15px; /* 각지지 않게 둥글게 수정 */
        border: 1px solid var(--blue);
        background: var(--blue); /* 전체 버튼과 같은 파란색 */
        color: white;
        cursor: pointer;
    }
    .today-btn:first-of-type {
        background: white;
        color: var(--blue);
    }

    /* 달력 그리드 */
    .calendar-card { background: white; padding: 10px; border-radius: 15px; box-shadow: 0 8px 25px rgba(255,133,161,0.15); border: 2px solid var(--soft-pink); width: 100%; box-sizing: border-box; }
    .grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: minmax(100px, auto); gap: 4px; width: 100%; }
    .day-header { text-align: center; font-weight: bold; padding: 5px; color: var(--pink); font-size: 12px; }
    .day-header:nth-child(1) { color: var(--sun); }
    .day-header:nth-child(7) { color: var(--sat); }

    .day { min-height: 100px; background: white; border: 1px solid #ffeef1; border-radius: 6px; padding: 6px; cursor: pointer; position: relative; font-size: 13px; display: flex; flex-direction: column; }
    .day.today { border: 2px solid var(--pink) !important; background: var(--today) !important; }
    .day.sun .date-num, .day.sun .holiday-label { 
        color: red !important;
        font-weight: bold;
        display: block;
        margin-top: 2px;
        }
    .day.sat .date-num { color: var(--sat); }
    .day .date-num { font-weight: bold; margin-bottom: 4px; }
    /* 일정 태그 */
    .event-container { display: flex; flex-wrap: wrap; gap: 3px; width: 100%; padding: 2px; justify-content: flex-start; }
    .event-tag { 
        display: block !important; 
        width: 100%;
        margin-bottom: 2px;
        padding: 2px 4px; 
        border-radius: 4px; 
        font-size: 11px;

    .work-tag { border-left: 3px solid var(--blue); font-weight: 800; background: #f0f4f8 !important; }

    /* 모달 사이즈 복구 (홀브 영상 기준: 가로 확장) */
    .modal { 
        display: none; 
        position: fixed !important; 
        top: 50% !important; 
        left: 50% !important; 
        transform: translate(-50%, -50%) !important; 
        background: white !important; 
        padding: 25px;

        z-index: 1500 !important;

        border: 3px solid var(--pink);

        box-sizing: border-box;

    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); z-index: 1400; }

    /* 메모장 */

    #memo-area { width: 100%; height: 100%; background: transparent; border: none; font-family: 'Nanum Gothic', sans-serif; font-size: 16px; font-weight: 800; line-height: 1.8; resize: none; outline: none; padding: 10px; box-sizing: border-box; overflow-y: auto; }
    
    @media (max-width: 768px) {

        .event-tag { display: block !important; font-size: 9px; letter-spacing: -1px; padding: 2px 1px; width: 100%; box-sizing: border-box; white-space: normal; word-break: break-all; line-height: 1.1; }
        .holiday-label { display: block !important; font-size: 9px; letter-spacing: -0.5px; }
    
        
        .year-area {

        .memo-container:not(.active) #memo-area { display: none; }

    .add-btn { width: 100%; padding: 14px; background: var(--pink); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
</style>

async function fetchHolidays(year) {
    if (cachedHolidays[year]) return cachedHolidays[year];
    
    try {
        const res = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/KR`);
        const hData = await res.json();
        const hMap = {};
        hData.forEach(h => { 
            const d = new Date(h.date); 
            // 승일 님 데이터 형식에 맞게 '월-일'로 저장
            hMap[`${d.getMonth() + 1}-${d.getDate()}`] = h.localName; 
        });
        cachedHolidays[year] = hMap;
        
        // 데이터 도착했으니 화면 갱신 (지각 방지)
        renderCalendar(); 
    } catch (e) { return {}; }
}
    
    async function renderCalendar() {
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';
    document.getElementById('display-year').innerText = currentYear;
    document.getElementById('month-display').innerText = `${currentMonth + 1}월`;

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();

    // 요일 헤더 생성
    ['일','월','화','수','목','금','토'].forEach(d => {
        grid.innerHTML += `<div class="day-header">${d}</div>`;
    });

    // 시작일 앞 빈칸 생성
    for(let i=0; i<firstDay; i++) {
        grid.innerHTML += `<div class="day"></div>`;
    }

    // 미리 받아둔 공휴일 데이터 가져오기 (await 없이 즉시!)
    const holidayList = (window.cachedHolidays && cachedHolidays[currentYear]) ? cachedHolidays[currentYear] : {};
    const currentData = window.data || {};
    for (let d = 1; d <= lastDate; d++) {
        const dayOfWeek = new Date(currentYear, currentMonth, d).getDay();
        const dateStr = `${currentMonth + 1}-${d}`; // '1-1' 형식
        const fixH = holidayList[dateStr];
        const events = currentData[dateStr] || [];
        const userH = events.find(ev => ev.isHoliday); // 직접 등록한 공휴일 체크
        const hName = fixH || (userH ? userH.text : ""); // 둘 중 하나라도 있으면 이름 확정

        // 2. 클래스 결정 (일요일 또는 공휴일이면 "sun" 추가해서 빨갛게!)
        let dayClass = (dayOfWeek === 0 || fixH || userH) ? "day sun" : (dayOfWeek === 6 ? "day sat" : "day");

        // 오늘 날짜 체크
        const today = new Date();
        if (currentYear === today.getFullYear() && currentMonth === today.getMonth() && d === today.getDate()) {
            dayClass += " today";
        }

        // 3. 일정 정렬 (근무 -> 공휴일 -> 일반순)
        const sortedEvents = [...events].sort((a, b) => {
            if (a.isWork !== b.isWork) return a.isWork ? -1 : 1;
            if (a.isHoliday !== b.isHoliday) return a.isHoliday ? -1 : 1;
            return 0;
        });

        // 4. 이벤트 태그 HTML 생성 (공휴일은 별도 라벨로 뺄 것이므로 제외)
        const eventHtml = sortedEvents.filter(ev => !ev.isHoliday).map(ev => {
            const task = ev.text.trim();
            const bgColor = ev.isWork ? (cycleColors[task] || ev.color) : ev.color;
            return `<span class="event-tag ${ev.isWork ? 'work-tag' : ''}" style="background-color:${bgColor} !important;">${ev.text}</span>`;
        }).join('');

        // 5. 최종 출력
        grid.innerHTML += `
            <div class="${dayClass}" ondblclick="openModal('${dateStr}')">
                <span class="date-num">${d}</span>
                <div class="event-container">
                    ${eventHtml}
                    ${hName ? `<span class="holiday-label">${hName}</span>` : ''}
                </div>
            </div>`;
    }
}

    window.applyPattern = async () => {
        const startDay = parseInt(document.getElementById('p-day').value);
        const startIdx = parseInt(document.getElementById('p-idx').value);
        const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
        
        // 8일 주기 패턴 정의
        const fullCycle = ["주", "주", "야", "숙", "비", "비", "야", "숙"];
        const cycleColors = { "주": "#e3f2fd", "야": "#ede7f6", "숙": "#fff9c4", "비": "#e8f5e9" };

        if (confirm(`${currentMonth + 1}월 ${startDay}일부터 말일까지 패턴을 적용하시겠습니까?\n(기존 근무 일정은 삭제됩니다.)`)) {
            for (let d = startDay; d <= lastDate; d++) {
                const dateStr = `${currentYear}-${currentMonth + 1}-${d}`;
                
                // 기존 데이터에서 '근무(isWork)' 태그만 필터링해서 제거 (가족 일정은 보존)
                if (!data[dateStr]) data[dateStr] = [];
                data[dateStr] = data[dateStr].filter(ev => !ev.isWork);

                // 선택한 시작 인덱스부터 순환하며 패턴 삽입
                const currentIdx = (startIdx + (d - startDay)) % 8;
                const task = fullCycle[currentIdx];
                
                data[dateStr].unshift({
                    text: task,
                    color: cycleColors[task],
                    isWork: true,
                    isHoliday: false
                });
            }

            try {
                await setDoc(doc(db, "work_planner", "data"), data);
                alert("패턴이 정상적으로 적용되었습니다.");
                window.closeAll();
                renderCalendar();
            } catch (e) {
                alert("저장 중 오류가 발생했습니다.");
            }
        }
    };
    window.openModal = (d) => {
        selectedDate = d; editIndex = null; document.getElementById('event-input').value = '';
        document.getElementById('is-holiday').checked = false;
        const p = d.split('-'); 
        document.getElementById('modal-date-display').innerText = `${p[0]}년 ${p[1]}월 ${p[2]}일`;
        document.getElementById('modal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
        window.updateModalList();
    };

window.updateModalList = () => {
        const div = document.getElementById('modal-list'); 
        div.innerHTML = '';
        const events = data[selectedDate] || [];

        // 정렬: 공휴일 -> 근무 -> 일반 일정
        const sorted = [...events].sort((a, b) => {
            if (a.isHoliday !== b.isHoliday) return a.isHoliday ? -1 : 1;
            if (a.isWork !== b.isWork) return a.isWork ? -1 : 1;
            return 0;
        });

        if (events.length === 0) {
            div.innerHTML = '<div style="text-align:center; color:#ccc; font-size:14px; padding:20px;">등록된 일정이 없습니다.</div>';
            return;
        }

        sorted.forEach((ev) => {
            // 삭제/수정을 위해 원본 배열에서의 실제 위치(index)를 정확히 찾음
            const originalIndex = events.indexOf(ev); 
            const icon = ev.isHoliday ? `<span style="color:#e53935; margin-right:5px;">🚩</span>` : '';
            const workLabel = ev.isWork ? '[근무] ' : '';
            
            div.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; background:${ev.isHoliday ? '#fff5f5' : (ev.color || '#eee')}; padding:10px; margin-bottom:8px; border-radius:10px; border:1px solid #eee;">
                <span onclick="prepareEdit(${originalIndex})" style="cursor:pointer; flex:1; font-size:15px;">
                    ${icon}${workLabel}${ev.text}
                </span>
                <button onclick="deleteEvent(${originalIndex})" style="border:none; background:none; color:#ff85a1; cursor:pointer; font-size:22px; font-weight:bold;">&times;</button>
            </div>`;
        });
    };

    window.addEvent = async () => {
        const val = document.getElementById('event-input').value; if (!val) return;
        if (!data[selectedDate]) data[selectedDate] = [];
        const ev = { text: val, color: selectedColor, isHoliday: document.getElementById('is-holiday').checked, isWork: false };
        if (editIndex !== null) data[selectedDate][editIndex] = ev; else data[selectedDate].push(ev);
        await setDoc(doc(db, "work_planner", "data"), data); 
        editIndex = null; document.getElementById('event-input').value = ''; 
        window.updateModalList(); // 홀브 방식: 저장 후 바로 목록 갱신
    };

window.openYearlyView = async () => {
        const container = document.getElementById('yearly-list-container'); 
        container.innerHTML = '<div style="text-align:center; padding:20px;">데이터 로딩 중...</div>';
        
        document.getElementById('yearly-modal').style.display = 'flex';
        document.getElementById('overlay').style.display = 'block';

        const hList = await fetchHolidays(currentYear); 

        console.log("API에서 받은 공휴일 전체 데이터:", hList); // <-- 여기서 데이터 형식을 꼭 확인하세요!
    
        container.innerHTML = '';
        document.getElementById('yearly-title').innerText = currentYear;

        for (let m = 1; m <= 12; m++) {
            let mHtml = '';
            const lastDay = new Date(currentYear, m, 0).getDate();
            for(let d = 1; d <= lastDay; d++) {
                const dateStr = `${currentYear}-${m}-${d}`;
                const fixH = hList[`${m}-${d}`];
                const dayEvents = data[dateStr] || [];
                
                let combined = [];
                // 1. 법정 공휴일(API) 먼저 추가
                if(fixH) combined.push(`<span style="color:red; font-weight:bold;">[${fixH}]</span>`);

                // 2. 사용자 입력 데이터 중 '근무(isWork)'가 아닌 것만 필터링 후 정렬
                const personalEvents = dayEvents
                    .filter(ev => ev.isWork !== true) // [핵심] 근무는 여기서 제외됩니다.
                    .sort((a, b) => (a.isHoliday === b.isHoliday ? 0 : a.isHoliday ? -1 : 1));
                
                personalEvents.forEach(ev => {
                    const tag = ev.isHoliday ? 
                        `<span style="color:red; font-weight:bold;">[${ev.text}]</span>` : 
                        ev.text;
                    combined.push(tag);
                });

                // 3. 공휴일이나 개인 일정이 있을 때만 리스트에 표시
                if (combined.length > 0) {
                    mHtml += `<div style="display:flex; padding:8px; border-bottom:1px solid #eee; font-size:15px;">
                        <span style="width:50px; font-weight:800;">${d}일</span>
                        <span style="flex:1;">${combined.join(', ')}</span>
                    </div>`;
                }
            }
            if (mHtml) container.innerHTML += `<div style="margin-top:15px; border-bottom:3px solid var(--pink); padding-bottom:5px; font-weight:bold; color:var(--pink); font-size:18px;">${m}월</div>` + mHtml;
        }
    };

    window.closeAll = () => { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); document.getElementById('overlay').style.display = 'none'; document.querySelector('.memo-container').classList.remove('active'); };
    window.openPatternModal = () => { document.getElementById('pattern-modal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; };
    window.deleteEvent = async (i) => { data[selectedDate].splice(i, 1); await setDoc(doc(db, "work_planner", "data"), data); window.updateModalList(); };
    window.prepareEdit = (i) => { const ev = data[selectedDate][i]; document.getElementById('event-input').value = ev.text; document.getElementById('is-holiday').checked = ev.isHoliday; editIndex = i; };
    window.selectColor = (c, el) => { selectedColor = c; document.querySelectorAll('.color-btn').forEach(b => b.style.border = 'none'); el.style.border = '2px solid #333'; };
    window.changeMonth = (n) => { currentMonth += n; if (currentMonth < 0) { currentMonth = 11; currentYear--; } else if (currentMonth > 11) { currentMonth = 0; currentYear++; } renderCalendar(); };
    window.goToday = () => { const n = new Date(); currentYear = n.getFullYear(); currentMonth = n.getMonth(); renderCalendar(); };
    window.toggleMemo = (e) => { if (window.innerWidth <= 768) { document.querySelector('.memo-container').classList.toggle('active'); document.getElementById('overlay').style.display = document.querySelector('.memo-container').classList.contains('active') ? 'block' : 'none'; } };
    document.getElementById('memo-area').addEventListener('input', (e) => { clearTimeout(memoTimer); memoTimer = setTimeout(() => setDoc(doc(db, "work_planner", "memo"), { text: e.target.value }), 800); });
    // [이 위치에 추가!] 스와이프 기능 로직
    let touchStartX = 0;
    let touchEndX = 0;

    // 달력 그리드 영역을 선택해서 터치 이벤트를 겁니다.
    const calendarGrid = document.getElementById('calendar-grid');

    calendarGrid.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    calendarGrid.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        const swipeDistance = touchEndX - touchStartX;
        const threshold = 60; // 60픽셀 이상 밀어야 작동 (너무 민감하지 않게)

        if (swipeDistance > threshold) {
            window.changeMonth(-1); // 오른쪽으로 밀면 이전 달
        } else if (swipeDistance < -threshold) {
            window.changeMonth(1);  // 왼쪽으로 밀면 다음 달
        }
    }, { passive: true });
    renderCalendar();
</script>
</body>
</html>
