<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Woo's 가족 일정</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');

    :root { 
        --blue: #1a3a6d; --pink: #ff85a1; --soft-pink: #fff0f3; --today: #fffde7; 
        --mint: #e0f2f1; --sat: #1e88e5; --sun: #e53935; 
    }
    
    body { font-family: 'Nanum Gothic', sans-serif; background: var(--soft-pink); margin: 0; padding: 10px; overflow-x: hidden; width: 100%; box-sizing: border-box; }

    /* [유지] 헤더 및 메모장 레이아웃 */
    .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(255,133,161,0.1); margin-bottom: 15px; border: 1px solid var(--soft-pink); }
    .year-area { display: flex; align-items: center; white-space: nowrap; font-size: 28px; font-weight: 800; color: var(--blue); }
    .today-btn { padding: 5px 12px; cursor: pointer; background: white; color: var(--pink); border: 2px solid var(--pink); border-radius: 20px; font-weight: bold; font-size: 14px; margin-left: 8px; }

    /* [유지] 달력 카드 및 그리드 */
    .calendar-card { background: white; padding: 10px; border-radius: 15px; box-shadow: 0 8px 25px rgba(255,133,161,0.15); border: 2px solid var(--soft-pink); width: 100%; box-sizing: border-box; }
    .grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: minmax(100px, auto); gap: 4px; width: 100%; }

    .day-header { text-align: center; font-weight: bold; padding: 5px; color: var(--pink); font-size: 12px; }
    .day-header:nth-child(1) { color: var(--sun); }
    .day-header:nth-child(7) { color: var(--sat); }

    .day { min-height: 100px; background: white; border: 1px solid #ffeef1; border-radius: 6px; padding: 6px; cursor: pointer; position: relative; font-size: 13px; display: flex; flex-direction: column; height: auto; }
    .day.today { border: 2px solid var(--pink) !important; background: var(--today) !important; box-shadow: inset 0 0 5px rgba(255,133,161,0.3); }
    .day.today .date-num { background: var(--pink); color: white !important; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; }
    .day.sun .date-num, .day.sun .holiday-label { color: var(--sun) !important; }
    .day.sat .date-num { color: var(--sat); }
    .day .date-num { font-weight: bold; margin-bottom: 4px; }

    .holiday-label { font-size: 11px; font-weight: 800; display: block; margin-bottom: 3px; word-break: break-all; }
    .event-container { display: flex; flex-wrap: wrap; gap: 3px; width: 100%; padding: 2px; justify-content: flex-start; }

/* --- 수정 시작 --- */
.event-tag { 
    display: block; /* 한 줄에 하나씩(줄바꿈처럼 보이게) */
    padding: 3px 5px; 
    border-radius: 4px; 
    font-size: 11px; 
    color: #333; 
    line-height: 1.3; 
    margin-bottom: 2px;
    width: 95%; 
    word-break: break-all; 
    white-space: pre-wrap; /* 저장된 엔터값 그대로 표시 */
    box-shadow: 0 1px 2px rgba(0,0,0,0.1); 
    cursor: pointer;
    background-color: #eee; /* 기본 배경색 */
}
/* --- 수정 끝 --- */
    /* [유지] PC 메모장 스타일 */
    .memo-container { position: relative; background: #e0f2f1; width: 450px; height: 180px; padding: 10px; box-shadow: 5px 5px 15px rgba(0,0,0,0.1); border-left: 10px solid #b2dfdb; z-index: 100; cursor: text; }
    #memo-area { width: 100%; height: 100%; background: transparent; border: none; font-family: 'Nanum Gothic', sans-serif; font-size: 16px; font-weight: 800; line-height: 1.8; resize: none; outline: none; display: block; color: #1a1a1a; caret-color: #ff0000 !important; padding: 10px; box-sizing: border-box; overflow-y: auto; }

    .nav-control { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0; }
    .nav-btn { padding: 8px 16px; cursor: pointer; background: var(--pink); color: white; border: none; border-radius: 8px; font-weight: bold; }
    
    /* 모달 */
/* --- [여기에 붙여넣으세요] --- */
:root { --pink: #ff85a1; } /* 핑크 변수 정의 */

.modal { 
    display: none; 
    position: fixed; 
    top: 50%; 
    left: 50%; 
    transform: translate(-50%, -50%); 
    background: white; 
    padding: 20px; 
    border-radius: 20px; 
    z-index: 1001; 
    width: 280px; 
    border: 3px solid var(--pink); 
}

.add-btn { 
    width: 100%; 
    padding: 12px; 
    background: var(--pink); 
    color: white; 
    border: none; 
    border-radius: 10px; 
    font-weight: bold; 
    cursor: pointer;
}
/* -------------------------- */
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(2px); z-index: 999; }

    /* [유지] 모바일 대응 */
    @media (max-width: 768px) {
        .memo-container { position: fixed !important; top: 20px !important; right: 10px !important; width: 50px !important; height: 50px !important; border-radius: 50% !important; border: 3px solid #b2dfdb !important; padding: 0 !important; display: flex !important; justify-content: center !important; align-items: center !important; background: #e0f2f1; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .memo-container:not(.active)::before { content: '📝'; font-size: 24px; }
        .memo-container:not(.active) #memo-area { display: none !important; }
        .memo-container.active { border-radius: 15px !important; top: 50% !important; left: 50% !important; transform: translate(-50%, -50%) !important; width: 90% !important; height: 350px !important; z-index: 1001 !important; padding: 15px !important; }
        .grid { grid-template-columns: repeat(7, minmax(12.5%, 1fr)); gap: 1px; }
        .event-tag { font-size: 9px; letter-spacing: -1px; padding: 2px 1px; width: 100%; box-sizing: border-box; white-space: normal; word-break: break-all; line-height: 1.1; }
        .day { min-height: 90px; padding: 3px; }
    }

    #yearly-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 20px; z-index: 1001; border: 3px solid var(--blue); box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 90%; max-width: 500px; height: 80vh; flex-direction: column; }
    
    /* [추가 기능] 근무 패턴용 스타일 */
    .pattern-btn { background: var(--blue); color: white; border: 2px solid var(--blue); border-radius: 20px; padding: 5px 12px; font-weight: bold; font-size: 14px; cursor: pointer; margin-left: 5px; }
    .work-tag { border-left: 3px solid var(--blue); font-weight: 800; background: #f0f4f8 !important; }
</style>
</head>
<body>
    <div class="header">
        <div class="year-area">
            <span id="display-year"></span>년 
            <button class="today-btn" onclick="goToday()">오늘</button>
            <button class="pattern-btn" onclick="openPatternModal()">패턴</button>
            <button class="today-btn" onclick="openYearlyView()" style="margin-left:5px; margin-right:15px; background:var(--blue); color:white; border-color:var(--blue);">연간 일정</button>
        </div>
        <div class="memo-container" onclick="toggleMemo(event)"><textarea id="memo-area" placeholder="메모를 입력하세요..."></textarea></div>
    </div>
    
    <div class="nav-control">
        <button class="nav-btn" onclick="changeMonth(-1)">◀ 이전달</button>
        <span id="month-display" style="font-size: 20px; font-weight: bold; color: var(--blue);"></span>
        <button class="nav-btn" onclick="changeMonth(1)">다음달 ▶</button>
    </div>

    <div class="calendar-card"><div class="grid" id="calendar-grid"></div></div>
    
    <div id="overlay" class="overlay" onclick="closeAll()"></div>

    <div id="modal" class="modal">
        <h3 id="modal-date-display" style="text-align: center; color: #333; margin-bottom: 20px;"></h3>
        <div style="font-size: 13px; color: #555; margin-bottom: 8px; font-weight: bold;">📅 등록된 일정</div>
        <div id="modal-list" style="margin-bottom:20px; max-height:180px; overflow-y:auto; border: 1px solid #ddd; padding: 10px; border-radius: 12px; background: #fafafa;"></div>
        <div style="display: flex; flex-direction: column; gap: 10px;">
    
        <input type="text" id="event-input" placeholder="일정 내용을 입력하세요" style="width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box;">
    
        <div style="display: flex; gap: 12px; justify-content: center; margin: 10px 0;">
            <div class="color-btn" onclick="selectColor('#ffdce0', this)" style="background:#ffdce0; width:35px; height:35px; border-radius:50%; cursor:pointer; border:2px solid #333;"></div>
            <div class="color-btn" onclick="selectColor('#e2f0cb', this)" style="background:#e2f0cb; width:35px; height:35px; border-radius:50%; cursor:pointer;"></div>
            <div class="color-btn" onclick="selectColor('#c7ceea', this)" style="background:#c7ceea; width:35px; height:35px; border-radius:50%; cursor:pointer;"></div>
            <div class="color-btn" onclick="selectColor('#f7d1ba', this)" style="background:#f7d1ba; width:35px; height:35px; border-radius:50%; cursor:pointer;"></div>
        </div>
    
       <div style="display: flex; align-items: center; gap: 8px; background: #fff4f4; padding: 8px; border-radius: 8px;">
            <input type="checkbox" id="is-holiday" style="width:18px; height:18px;">
            <label for="is-holiday" style="color: #e53935; font-weight: bold; font-size: 13px;">이 일정을 공휴일(빨간날)로 지정</label>
        </div>
    
        <button class="add-btn" onclick="addEvent()">추가 / 수정 저장</button>
        <div onclick="closeAll()" style="text-align:center; margin-top:15px; color:#aaa; cursor:pointer; font-size:14px;">취소하고 닫기</div>
    </div>

    <div id="pattern-modal" class="modal" style="border-color: var(--blue);">
        <h3 style="text-align: center; color: var(--blue);">교대 근무 패턴 생성</h3>
        <div style="margin-bottom: 15px;">
            시작 일자: <input type="number" id="p-day" value="1" min="1" max="31" style="width: 50px; padding: 5px;"> 일
        </div>
        <div style="margin-bottom: 20px;">
            시작 근무: 
            <select id="p-idx" style="width: 100%; padding: 10px; border-radius: 8px;">
                <option value="0">주간(주)</option><option value="1">주간(주)</option>
                <option value="2">야간(야)</option><option value="3">숙직(숙)</option>
                <option value="4">비번(비)</option><option value="5">비번(비)</option>
                <option value="6">야간(야)</option><option value="7">숙직(숙)</option>
            </select>
        </div>
        <button onclick="applyPattern()" style="width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 10px; font-weight: bold;">패턴 일괄 적용</button>
        <button onclick="closeAll()" style="width:100%; margin-top:15px; border:none; background:transparent; color: #999;">닫기</button>
    </div>

    <div id="yearly-modal" class="modal">
        <h2 style="text-align: center; color: var(--blue);">📅 <span id="yearly-title"></span>년 전체 일정</h2>
        <div id="yearly-list-container" style="flex: 1; overflow-y: auto; padding: 10px; background: #f9f9f9; border-radius: 10px;"></div>
        <button onclick="closeYearlyView()" style="width: 100%; padding: 15px; margin-top: 10px; border: none; background: var(--pink); color: white; border-radius: 10px; font-weight: bold;">닫기</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const bdbConfig = { apiKey: "$BDB_API_KEY", authDomain: "$BDB_AUTH_DOMAIN", projectId: "$BDB_PROJECT_ID", storageBucket: "$BDB_STORAGE_BUCKET", messagingSenderId: "$BDB_SENDER_ID", appId: "$BDB_APP_ID" };
    const app = initializeApp(bdbConfig);
    const db = getFirestore(app);

    let currentYear = new Date().getFullYear(), currentMonth = new Date().getMonth();
    let data = {}, selectedDate = "", selectedColor = "#ffdce0", memoTimer, editIndex = null, cachedHolidays = {};
    const cycle = ["주", "주", "야", "숙", "비", "비", "야", "숙"];
    const cycleColors = { "주": "#e3f2fd", "야": "#ede7f6", "숙": "#fff9c4", "비": "#e8f5e9" };

    onSnapshot(doc(db, "work_planner", "data"), (snap) => { if (snap.exists()) { data = snap.data(); renderCalendar(); } });
    onSnapshot(doc(db, "work_planner", "memo"), (snap) => {
        const memoArea = document.getElementById('memo-area');
        if (snap.exists() && memoArea && document.activeElement !== memoArea) { memoArea.value = snap.data().text || ""; }
    });

    async function fetchHolidays(year) {
        if (cachedHolidays[year]) return cachedHolidays[year];
        try {
            const res = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/KR`);
            const hData = await res.json();
            const hMap = {};
            hData.forEach(h => { const d = new Date(h.date); hMap[`${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`] = h.localName; });
            cachedHolidays[year] = hMap; return hMap;
        } catch (e) { return {}; }
    }

    async function renderCalendar() {
        const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
        document.getElementById('display-year').innerText = currentYear;
        document.getElementById('month-display').innerText = `${currentMonth + 1}월`;

        const holidays = await fetchHolidays(currentYear);
        const firstDay = new Date(currentYear, currentMonth, 1).getDay(), lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
        ['일','월','화','수','목','금','토'].forEach(d => grid.innerHTML += `<div class="day-header">${d}</div>`);
        for(let i=0; i<firstDay; i++) grid.innerHTML += `<div class="day"></div>`;

        const now = new Date();
        for(let d=1; d<=lastDate; d++) {
            const dateStr = `${currentYear}-${currentMonth+1}-${d}`, dayOfWeek = new Date(currentYear, currentMonth, d).getDay();
            const userEvents = data[dateStr] || [], isUserHoliday = userEvents.find(ev => ev.isHoliday);
            let holidayName = holidays[dateStr] || (isUserHoliday ? isUserHoliday.text : '');

            let dayClass = (dayOfWeek === 0 || holidayName) ? "day sun" : (dayOfWeek === 6 ? "day sat" : "day");
            if (currentYear === now.getFullYear() && currentMonth === now.getMonth() && d === now.getDate()) dayClass += " today";

            const eventHtml = userEvents.filter(ev => !ev.isHoliday).map(ev => {
                // 글자 앞뒤 공백 제거 후 색상 매칭 (예: " 주 " -> "주")
                const task = ev.text.trim();
                const bgColor = ev.isWork ? (cycleColors[task] || ev.color || '#eee') : (ev.color || '#eee');
                return `<span class="event-tag ${ev.isWork ? 'work-tag' : ''}" style="background-color:${bgColor} !important;">${ev.text}</span>`;
            }).join('');

            grid.innerHTML += `<div class="${dayClass}" ondblclick="openModal('${dateStr}')">
                <span class="date-num">${d}</span>
                ${holidayName ? `<span class="holiday-label">${holidayName}</span>` : ''}
                <div class="event-container">${eventHtml}</div>
            </div>`;
        }
    }

    window.addEvent = async () => {
        const input = document.getElementById('event-input'), isHolidayChecked = document.getElementById('is-holiday').checked;
        if (!input.value) return;
        if (!data[selectedDate]) data[selectedDate] = [];
        const ev = { text: input.value, color: selectedColor, isHoliday: isHolidayChecked, isWork: false };
        if (editIndex !== null) data[selectedDate][editIndex] = ev; else data[selectedDate].push(ev);
        await setDoc(doc(db, "work_planner", "data"), data); window.closeAll();
    };

    window.applyPattern = async () => {
        const startDay = parseInt(document.getElementById('p-day').value), startIdx = parseInt(document.getElementById('p-idx').value);
        const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate(); let idx = startIdx;
        for (let d = startDay; d <= lastDate; d++) {
            const ds = `${currentYear}-${currentMonth+1}-${d}`; if (!data[ds]) data[ds] = [];
            data[ds] = data[ds].filter(e => !e.isWork);
            const type = cycle[idx % 8];
            data[ds].unshift({ 
                text: type, 
                color: cycleColors[type], 
                isWork: true, 
                isHoliday: false 
            });
            idx++;
        }
        await setDoc(doc(db, "work_planner", "data"), data); window.closeAll();
    };

    window.openModal = (d) => { selectedDate = d; editIndex = null; document.getElementById('event-input').value = ''; document.getElementById('is-holiday').checked = false; const p = d.split('-'); document.getElementById('modal-date-display').innerText = `${p[1]}월 ${p[2]}일`; document.getElementById('modal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; window.updateModalList(); };
    window.updateModalList = () => {
        const div = document.getElementById('modal-list'); div.innerHTML = '';
        const events = [...(data[selectedDate] || [])]; // 원본 데이터 보존을 위해 복사본 생성
    
        // 1. 정렬 로직: 공휴일(🚩) -> 근무([근무]) -> 일반 일정 순서
        events.sort((a, b) => {
            if (a.isHoliday !== b.isHoliday) return b.isHoliday ? 1 : -1;
            if (a.isWork !== b.isWork) return b.isWork ? 1 : -1;
            return 0;
        });
    
        events.forEach((ev, i) => {
            const displayText = ev.isWork ? `[근무] ${ev.text}` : ev.text;
        const task = ev.text.trim();
        const bgColor = ev.isWork ? (cycleColors[task] || ev.color || '#eee') : (ev.isHoliday ? '#fff5f5' : (ev.color || '#eee'));
        
        div.innerHTML += `
            <div style="display:flex; justify-content:space-between; align-items:center; background:${bgColor} !important; padding:8px; margin-bottom:8px; border-radius:12px; height:45px; box-sizing:border-box; border: ${ev.isHoliday ? '1px solid #ffcdd2' : '1px solid #eee'};">
                <span onclick="prepareEdit(${i})" style="cursor:pointer; flex:1; text-align: left; font-family: inherit; font-size: 14px; font-weight:${ev.isHoliday || ev.isWork ? 'bold' : 'normal'}; color:${ev.isHoliday ? '#c62828' : '#333'}; white-space: pre-wrap; word-break: break-all; line-height: 1.2;">
                    ${ev.isHoliday ? '🚩 ' : ''}${displayText}
                </span>
                <button onclick="deleteEvent(${i})" style="border:none; background:none; color:#999; cursor:pointer; font-size:18px; padding:0 5px; display:flex; align-items:center;">&times;</button>
            </div>`;
        });
    };

    window.deleteEvent = async (i) => { data[selectedDate].splice(i, 1); await setDoc(doc(db, "work_planner", "data"), data); window.updateModalList(); };
    window.prepareEdit = (i) => { const ev = data[selectedDate][i]; document.getElementById('event-input').value = ev.text; document.getElementById('is-holiday').checked = ev.isHoliday; editIndex = i; };
    window.closeAll = () => { document.querySelector('.memo-container').classList.remove('active'); document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); document.getElementById('overlay').style.display = 'none'; };
    window.openYearlyView = () => { /* 원본 로직 유지 */ const container = document.getElementById('yearly-list-container'); document.getElementById('yearly-title').innerText = currentYear; container.innerHTML = ''; for (let m = 1; m <= 12; m++) { let mHtml = ''; Object.keys(data).forEach(ds => { const [y, mm, d] = ds.split('-').map(Number); if (y === currentYear && mm === m) data[ds].forEach(ev => { mHtml += `<div style="padding:5px; border-bottom:1px solid #eee;"><b>${d}일</b>: ${ev.text}</div>`; }); }); if (mHtml) container.innerHTML += `<div style="margin-top:10px; color:var(--pink); font-weight:bold;">${m}월</div>` + mHtml; } document.getElementById('yearly-modal').style.display = 'flex'; document.getElementById('overlay').style.display = 'block'; };
    window.closeYearlyView = () => { document.getElementById('yearly-modal').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; };
    window.openPatternModal = () => { document.getElementById('pattern-modal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; };
    window.selectColor = (c, el) => { selectedColor = c; document.querySelectorAll('.color-btn').forEach(b => b.style.border = 'none'); el.style.border = '2px solid #333'; };
    window.changeMonth = (n) => { currentMonth += n; if (currentMonth < 0) { currentMonth = 11; currentYear--; } else if (currentMonth > 11) { currentMonth = 0; currentYear++; } renderCalendar(); };
    window.goToday = () => { const n = new Date(); currentYear = n.getFullYear(); currentMonth = n.getMonth(); renderCalendar(); };
    window.toggleMemo = async (e) => { if (e) e.stopPropagation(); if (window.innerWidth <= 768) { document.querySelector('.memo-container').classList.toggle('active'); document.getElementById('overlay').style.display = document.querySelector('.memo-container').classList.contains('active') ? 'block' : 'none'; } };

    document.getElementById('memo-area').addEventListener('input', (e) => { clearTimeout(memoTimer); memoTimer = setTimeout(() => setDoc(doc(db, "work_planner", "memo"), { text: e.target.value }), 800); });

    renderCalendar();
</script>
</body>
</html>
