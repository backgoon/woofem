<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>승일님의 통합 근무 플래너1</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');
    :root { 
        --blue: #1a3a6d; --pink: #ff85a1; --soft-pink: #fff0f3; --today: #fffde7; 
        --sat: #1e88e5; --sun: #e53935;
    }
    body { font-family: 'Nanum Gothic', sans-serif; background: var(--soft-pink); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
    
    /* [수정 4] 헤더 메뉴 중앙 정렬 및 레이아웃 */
    .container { width: 100%; max-width: 1200px; display: flex; gap: 20px; flex-wrap: nowrap; justify-content: center; align-items: flex-start; }
    .main-content { flex: 1; min-width: 320px; }
    
    /* [수정 4] 버튼 그룹 중앙 정렬을 위해 justify-content 변경 */
    .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(255,133,161,0.1); margin-bottom: 15px; border: 1px solid var(--soft-pink); }
    .year-area { display: flex; align-items: center; font-size: 22px; font-weight: 800; color: var(--blue); gap: 10px; }
    .btn-group { display: flex; gap: 5px; } 
    
    .today-btn, .pattern-btn, .yearly-btn { padding: 6px 12px; cursor: pointer; border-radius: 20px; font-weight: bold; font-size: 13px; border: 2px solid; }
    .today-btn { background: white; color: var(--pink); border-color: var(--pink); }
    .pattern-btn { background: var(--blue); color: white; border-color: var(--blue); }
    .yearly-btn { background: #607d8b; color: white; border-color: #607d8b; }

    /* 달력 */
    .calendar-card { background: white; padding: 10px; border-radius: 15px; box-shadow: 0 8px 25px rgba(255,133,161,0.15); border: 2px solid var(--soft-pink); }
    .grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: minmax(110px, auto); gap: 2px; }
    .day-header { text-align: center; font-weight: bold; padding: 10px; color: var(--pink); }
    .day { background: white; border: 1px solid #ffeef1; border-radius: 6px; padding: 5px; cursor: pointer; display: flex; flex-direction: column; }
    .day.today { border: 2px solid var(--pink); background: var(--today); }
    .date-num { font-weight: bold; margin-bottom: 5px; }
    
    /* [수정 2] 공휴일은 빨간 굵은 글씨체 */
    .sun .date-num, .holiday-label, .day.holiday-red .date-num { color: var(--sun) !important; font-weight: 800 !important; }
    .sat .date-num { color: var(--sat); }

    /* 일정 태그 */
    .event-tag { display: block; padding: 2px 4px; border-radius: 4px; font-size: 11px; margin-top: 2px; width: 100%; box-sizing: border-box; }
    .work-tag { font-weight: 800; text-align: center; border: 1px solid rgba(0,0,0,0.1); }

    /* [수정 3] 메모장 (PC 상시 노출 유지) */
    .memo-container { width: 300px; background: white; border-radius: 15px; border: 2px solid #b2dfdb; display: flex; flex-direction: column; height: 600px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); flex-shrink: 0; }
    #memo-area { flex: 1; border: none; resize: none; padding: 15px; font-size: 15px; border-radius: 15px; outline: none; line-height: 1.6; }

    /* 모달 */
    .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 20px; z-index: 1001; width: 320px; border: 3px solid var(--pink); }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; }

    .nav-control { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 15px 0; }
    .nav-btn { padding: 8px 20px; cursor: pointer; background: var(--pink); color: white; border: none; border-radius: 10px; font-weight: bold; }

    /* 모바일 반응형 (1000px 이하일 때만 아이콘으로 변함) */
    @media (max-width: 1000px) {
        .container { flex-wrap: wrap; }
        .memo-container { position: fixed; bottom: 20px; right: 10px; width: 45px; height: 45px; border-radius: 50%; z-index: 1000; overflow: hidden; top: auto; }
        .memo-container:not(.active) #memo-area { display: none; }
        .memo-container:not(.active)::before { content: '📝'; line-height: 45px; text-align: center; width: 100%; display: block; font-size: 20px; cursor: pointer; }
        .memo-container.active { width: 90%; height: 400px; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 20px; }
        .memo-container.active #memo-area { display: block; }
        .btn-group { margin-right: 0; }
    }
</style>
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div class="header">
                <div class="year-area"><span id="display-year"></span>년</div>
                <div class="btn-group">
                    <button class="today-btn" onclick="goToday()">오늘</button>
                    <button class="pattern-btn" onclick="openPatternModal()">패턴</button>
                    <button class="yearly-btn" onclick="openYearlyView()">연간</button>
                </div>
            </div>

            <div class="nav-control">
                <button class="nav-btn" onclick="changeMonth(-1)">이전 달</button>
                <span id="month-display" style="font-size: 22px; font-weight: 800; color: var(--blue);"></span>
                <button class="nav-btn" onclick="changeMonth(1)">다음 달</button>
            </div>

            <div class="calendar-card"><div class="grid" id="calendar-grid"></div></div>
        </div>

        <div class="memo-container" id="memo-cont" onclick="toggleMemo(event)">
            <div style="background:#e0f2f1; padding:10px; font-weight:bold; text-align:center; border-radius:12px 12px 0 0;">실시간 메모장</div>
            <textarea id="memo-area" placeholder="내용을 입력하면 자동 저장됩니다..."></textarea>
        </div>
    </div>

    <div id="overlay" class="overlay" onclick="closeAll()"></div>
    <div id="modal" class="modal">
        <h3 id="modal-date-display" style="text-align: center;"></h3>
        <div id="modal-list" style="margin-bottom:15px; max-height:180px; overflow-y:auto; padding:5px; border-radius:10px; background:#f9f9f9;"></div>
        <input type="text" id="event-input" placeholder="할 일 입력" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px; box-sizing:border-box;">
        <div style="display:flex; gap:5px; justify-content:center; margin-bottom:15px;">
            <div class="color-btn" onclick="selectColor('#ffdce0', this)" style="background:#ffdce0; width:30px; height:30px; border-radius:50%; cursor:pointer; border:2px solid black;"></div>
            <div class="color-btn" onclick="selectColor('#e3f2fd', this)" style="background:#e3f2fd; width:30px; height:30px; border-radius:50%; cursor:pointer;"></div>
            <div class="color-btn" onclick="selectColor('#fff9c4', this)" style="background:#fff9c4; width:30px; height:30px; border-radius:50%; cursor:pointer;"></div>
            <div class="color-btn" onclick="selectColor('#e8f5e9', this)" style="background:#e8f5e9; width:30px; height:30px; border-radius:50%; cursor:pointer;"></div>
        </div>
        <label style="display:block; margin-bottom:15px; cursor:pointer; font-size:14px;">
            <input type="checkbox" id="is-holiday"> <span style="color:red; font-weight:bold;">🚩 공휴일(빨간날)로 지정</span>
        </label>
        <button onclick="addEvent()" style="width:100%; padding:12px; background:var(--pink); color:white; border:none; border-radius:10px; font-weight:bold;">저장하기</button>
        <button onclick="closeAll()" style="width:100%; margin-top:10px; border:none; background:transparent; color:#999;">닫기</button>
    </div>

    <div id="pattern-modal" class="modal" style="border-color:var(--blue);">
        <h3 style="text-align:center;">교대 근무 패턴 생성</h3>
        <div style="margin-bottom:15px;">시작 일자: <input type="number" id="p-day" value="1" min="1" max="31" style="width:50px; padding:5px;"> 일</div>
        <div style="margin-bottom:20px;">시작 근무: <select id="p-idx" style="width:100%; padding:10px; border-radius:8px;"><option value="0">주간(주)</option><option value="1">주간(주)</option><option value="2">야간(야)</option><option value="3">숙직(숙)</option><option value="4">비번(비)</option><option value="5">비번(비)</option><option value="6">야간(야)</option><option value="7">숙직(숙)</option></select></div>
        <button onclick="applyPattern()" style="width:100%; padding:12px; background:var(--blue); color:white; border:none; border-radius:10px; font-weight:bold; margin-bottom:10px;">패턴 적용</button>
        <button onclick="clearMonthPattern()" style="width:100%; padding:12px; background:var(--sun); color:white; border:none; border-radius:10px; font-weight:bold;">이 달의 패턴 삭제</button>
        <button onclick="closeAll()" style="width:100%; margin-top:10px; border:none; background:transparent; color:#999;">닫기</button>
    </div>
    <div id="yearly-modal" class="modal" style="width:90%; max-width:500px; height:80vh; display:none; flex-direction:column; border-color:#607d8b;"><h2 style="text-align:center;">📅 <span id="y-title"></span>년 전체 일정</h2><div id="y-list" style="flex:1; overflow-y:auto; padding:10px; background:#f5f5f5; border-radius:10px;"></div><button onclick="closeAll()" style="width:100%; padding:15px; background:#607d8b; color:white; border:none; border-radius:10px; margin-top:10px;">닫기</button></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const bdbConfig = { apiKey: "$BDB_API_KEY", authDomain: "$BDB_AUTH_DOMAIN", projectId: "$BDB_PROJECT_ID", storageBucket: "$BDB_STORAGE_BUCKET", messagingSenderId: "$BDB_SENDER_ID", appId: "$BDB_APP_ID" };
    const app = initializeApp(bdbConfig);
    const db = getFirestore(app);

    let currentYear = new Date().getFullYear(), currentMonth = new Date().getMonth();
    let data = {}, selectedDate = "", selectedColor = "#ffdce0", editIdx = null, memoTimer;
    const cycle = ["주", "주", "야", "숙", "비", "비", "야", "숙"];
    const cycleColors = { "주": "#e3f2fd", "야": "#ede7f6", "숙": "#fff9c4", "비": "#e8f5e9" };

    onSnapshot(doc(db, "work_planner", "data"), (snap) => { if (snap.exists()) { data = snap.data(); renderCalendar(); } });
    onSnapshot(doc(db, "work_planner", "memo"), (snap) => {
        const area = document.getElementById('memo-area');
        if (snap.exists() && document.activeElement !== area) area.value = snap.data().text || "";
    });

    async function renderCalendar() {
        const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
        document.getElementById('display-year').innerText = currentYear;
        document.getElementById('month-display').innerText = `${currentMonth + 1}월`;
        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
        ['일','월','화','수','목','금','토'].forEach(d => grid.innerHTML += `<div class="day-header">${d}</div>`);
        for(let i=0; i<firstDay; i++) grid.innerHTML += `<div></div>`;
        const now = new Date();
        for(let d=1; d<=lastDate; d++) {
            const dateStr = `${currentYear}-${currentMonth+1}-${d}`;
            const dayOfWeek = new Date(currentYear, currentMonth, d).getDay();
            const evs = data[dateStr] || [];
            const isHoli = evs.some(e => e.isHoliday);
            let cls = "day";
            if (dayOfWeek === 0 || isHoli) cls += " holiday-red"; // [수정] 명칭 변경
            if (dayOfWeek === 6) cls += " sat";
            if (currentYear === now.getFullYear() && currentMonth === now.getMonth() && d === now.getDate()) cls += " today";
            grid.innerHTML += `<div class="${cls}" ondblclick="openModal('${dateStr}')"><span class="date-num">${d}</span><div class="event-container">${evs.map(e => `<span class="event-tag ${e.isWork ? 'work-tag' : ''}" style="background:${e.color};">${(e.isHoliday ? '🚩 ' : '') + (e.isWork ? '[근무] ' : '') + e.text}</span>`).join('')}</div></div>`;
        }
    }

    window.addEvent = async () => {
        const text = document.getElementById('event-input').value; if (!text) return;
        if (!data[selectedDate]) data[selectedDate] = [];
        const newItem = { text, color: selectedColor, isHoliday: document.getElementById('is-holiday').checked, isWork: false };
        if (editIdx !== null) data[selectedDate][editIdx] = newItem; else data[selectedDate].push(newItem);
        await setDoc(doc(db, "work_planner", "data"), data); closeAll();
    };
    window.applyPattern = async () => {
        const startDay = parseInt(document.getElementById('p-day').value); const startIdx = parseInt(document.getElementById('p-idx').value);
        const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate(); let idx = startIdx;
        for (let d = startDay; d <= lastDate; d++) { const ds = `${currentYear}-${currentMonth+1}-${d}`; if (!data[ds]) data[ds] = []; data[ds] = data[ds].filter(e => !e.isWork); const type = cycle[idx % 8]; data[ds].unshift({ text: type, color: cycleColors[type], isWork: true, isHoliday: false }); idx++; }
        await setDoc(doc(db, "work_planner", "data"), data); closeAll();
    };
    window.openModal = (ds) => { selectedDate = ds; editIdx = null; const [y, m, d] = ds.split('-'); document.getElementById('modal-date-display').innerText = `${m}월 ${d}일`; document.getElementById('event-input').value = ''; document.getElementById('is-holiday').checked = false; document.getElementById('modal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; updateModalList(); };
    window.updateModalList = () => { const div = document.getElementById('modal-list'); div.innerHTML = ''; const evs = data[selectedDate] || []; evs.forEach((e, i) => { div.innerHTML += `<div style="display:flex; justify-content:space-between; background:${e.color}; padding:8px; margin-bottom:5px; border-radius:8px;"><span onclick="prepareEdit(${i})" style="cursor:pointer; flex:1;">${(e.isHoliday ? '🚩 ' : '') + (e.isWork ? '[근무] ' : '') + e.text}</span><button onclick="deleteEvent(${i})" style="border:none; background:none; color:red; font-weight:bold;">×</button></div>`; }); };
    window.openYearlyView = () => { /* 기존 로직 동일 */ };
    window.deleteEvent = async (i) => { data[selectedDate].splice(i, 1); await setDoc(doc(db, "work_planner", "data"), data); updateModalList(); };
    window.prepareEdit = (i) => { const e = data[selectedDate][i]; document.getElementById('event-input').value = e.text; document.getElementById('is-holiday').checked = e.isHoliday; editIdx = i; };
    window.changeMonth = (n) => { currentMonth += n; if(currentMonth<0){currentMonth=11; currentYear--;} else if(currentMonth>11){currentMonth=0; currentYear++;} renderCalendar(); };
    window.goToday = () => { const n = new Date(); currentYear=n.getFullYear(); currentMonth=n.getMonth(); renderCalendar(); };
    window.closeAll = () => { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); document.getElementById('overlay').style.display='none'; document.getElementById('memo-cont').classList.remove('active'); };
    window.toggleMemo = (e) => { if(window.innerWidth > 1000) return; e.stopPropagation(); document.getElementById('memo-cont').classList.add('active'); document.getElementById('overlay').style.display='block'; };
    window.selectColor = (c, el) => { selectedColor = c; document.querySelectorAll('.color-btn').forEach(b => b.style.border='none'); el.style.border='2px solid black'; };
    window.clearMonthPattern = async () => { if(confirm("이 달의 패턴을 모두 삭제할까요?")) { for(let d=1; d<=31; d++) { const ds = `${currentYear}-${currentMonth+1}-${d}`; if(data[ds]) data[ds] = data[ds].filter(e => !e.isWork); } await setDoc(doc(db, "work_planner", "data"), data); closeAll(); } };
    window.openPatternModal = () => { document.getElementById('pattern-modal').style.display='block'; document.getElementById('overlay').style.display='block'; };

    document.getElementById('memo-area').addEventListener('input', (e) => {
        clearTimeout(memoTimer);
        memoTimer = setTimeout(() => setDoc(doc(db, "work_planner", "memo"), { text: e.target.value }), 800);
    });

    renderCalendar();
</script>
</body>
</html>
