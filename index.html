<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Woo's 가족 일정</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');

    :root { 
        --blue: #1a3a6d; --pink: #ff85a1; --soft-pink: #fff0f3; --today: #fffde7; 
        --mint: #e0f2f1; --sat: #1e88e5; --sun: #e53935; 
    }
    
    body { font-family: 'Nanum Gothic', sans-serif; background: var(--soft-pink); margin: 0; padding: 10px; overflow-x: hidden; width: 100%; box-sizing: border-box; }

    /* 헤더 및 레이아웃 */
    .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(255,133,161,0.1); margin-bottom: 15px; border: 1px solid var(--soft-pink); }
    .year-area { display: flex; align-items: center; white-space: nowrap; font-size: 28px; font-weight: 800; color: var(--blue); }
    .today-btn { padding: 5px 12px; cursor: pointer; background: white; color: var(--pink); border: 2px solid var(--pink); border-radius: 20px; font-weight: bold; font-size: 14px; margin-left: 8px; }
    .pattern-btn { background: var(--blue); color: white; border: 2px solid var(--blue); border-radius: 20px; padding: 5px 12px; font-weight: bold; font-size: 14px; cursor: pointer; margin-left: 5px; }

    /* 달력 그리드 */
    .calendar-card { background: white; padding: 10px; border-radius: 15px; box-shadow: 0 8px 25px rgba(255,133,161,0.15); border: 2px solid var(--soft-pink); width: 100%; box-sizing: border-box; }
    .grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: minmax(100px, auto); gap: 4px; width: 100%; }
    .day-header { text-align: center; font-weight: bold; padding: 5px; color: var(--pink); font-size: 12px; }
    .day-header:nth-child(1) { color: var(--sun); }
    .day-header:nth-child(7) { color: var(--sat); }

    .day { min-height: 100px; background: white; border: 1px solid #ffeef1; border-radius: 6px; padding: 6px; cursor: pointer; position: relative; font-size: 13px; display: flex; flex-direction: column; }
    .day.today { border: 2px solid var(--pink) !important; background: var(--today) !important; }
    .day.sun .date-num, .day.sun .holiday-label { color: var(--sun) !important; }
    .day.sat .date-num { color: var(--sat); }
    .day .date-num { font-weight: bold; margin-bottom: 4px; }
    .holiday-label { font-size: 11px; font-weight: 800; display: block; margin-bottom: 3px; color: var(--sun); }

    /* 일정 태그 */
    .event-container { display: flex; flex-wrap: wrap; gap: 3px; width: 100%; justify-content: flex-start; }
    .event-tag { display: block; padding: 3px 5px; border-radius: 4px; font-size: 11px; color: #333; line-height: 1.3; margin-bottom: 2px; width: 95%; word-break: break-all; white-space: pre-wrap; background-color: #eee; }
    .work-tag { border-left: 3px solid var(--blue); font-weight: 800; background: #f0f4f8 !important; }

    /* 모달 (핵심 수정 부분: 모든 모달 공중부양 강제) */
    .modal { 
        display: none; 
        position: fixed !important; 
        top: 50% !important; 
        left: 50% !important; 
        transform: translate(-50%, -50%) !important; 
        background: white !important; 
        padding: 20px; 
        border-radius: 20px; 
        z-index: 1500 !important; 
        width: 280px; 
        border: 3px solid var(--pink); 
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        box-sizing: border-box;
    }
    #pattern-modal { border-color: var(--blue) !important; }
    #yearly-modal { width: 95% !important; max-width: 500px !important; height: 80vh !important; border-color: var(--blue) !important; overflow: hidden; }

    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); z-index: 1400; }

    /* 메모장 및 모바일 대응 */
    .memo-container { position: relative; background: #e0f2f1; width: 450px; height: 180px; padding: 10px; border-left: 10px solid #b2dfdb; cursor: text; }
    #memo-area { width: 100%; height: 100%; background: transparent; border: none; font-size: 16px; font-weight: 800; resize: none; outline: none; }
    
    @media (max-width: 768px) {
        .memo-container { position: fixed !important; top: 20px !important; right: 10px !important; width: 50px !important; height: 50px !important; border-radius: 50% !important; z-index: 1001 !important; display: flex; justify-content: center; align-items: center; }
        .memo-container.active { border-radius: 15px !important; top: 50% !important; left: 50% !important; transform: translate(-50%, -50%) !important; width: 90% !important; height: 350px !important; z-index: 1600 !important; padding: 15px !important; }
        .memo-container:not(.active) #memo-area { display: none; }
        .memo-container:not(.active)::before { content: '📝'; font-size: 24px; }
        .grid { grid-template-columns: repeat(7, 1fr); gap: 1px; }
        .day { min-height: 85px; padding: 3px; }
    }

    .nav-control { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0; }
    .nav-btn { padding: 8px 16px; cursor: pointer; background: var(--pink); color: white; border: none; border-radius: 8px; font-weight: bold; }
    .add-btn { width: 100%; padding: 12px; background: var(--pink); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>
    <div class="header">
        <div class="year-area">
            <span id="display-year"></span>년 
            <button class="today-btn" onclick="goToday()">오늘</button>
            <button class="pattern-btn" onclick="openPatternModal()">패턴</button>
            <button class="today-btn" onclick="openYearlyView()" style="background:var(--blue); color:white; border-color:var(--blue);">연간 일정</button>
        </div>
        <div class="memo-container" onclick="toggleMemo(event)"><textarea id="memo-area" placeholder="메모..."></textarea></div>
    </div>
    
    <div class="nav-control">
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <span id="month-display" style="font-size: 20px; font-weight: bold; color: var(--blue);"></span>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>

    <div class="calendar-card"><div class="grid" id="calendar-grid"></div></div>
    <div id="overlay" class="overlay" onclick="closeAll()"></div>

    <div id="modal" class="modal">
        <h3 id="modal-date-display" style="text-align: center; margin-bottom: 15px;"></h3>
        <div id="modal-list" style="margin-bottom:15px; max-height:150px; overflow-y:auto; border: 1px solid #eee; padding: 10px; border-radius: 10px; background: #fafafa;"></div>
        <input type="text" id="event-input" placeholder="내용 입력" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box;">
        <div style="display: flex; gap: 8px; justify-content: center; margin-bottom: 10px;">
            <div class="color-btn" onclick="selectColor('#ffdce0', this)" style="background:#ffdce0; width:30px; height:30px; border-radius:50%; cursor:pointer; border:2px solid #333;"></div>
            <div class="color-btn" onclick="selectColor('#e2f0cb', this)" style="background:#e2f0cb; width:30px; height:30px; border-radius:50%; cursor:pointer;"></div>
            <div class="color-btn" onclick="selectColor('#c7ceea', this)" style="background:#c7ceea; width:30px; height:30px; border-radius:50%; cursor:pointer;"></div>
        </div>
        <div style="display: flex; align-items: center; gap: 5px; margin-bottom: 10px; font-size: 13px;">
            <input type="checkbox" id="is-holiday"> <label for="is-holiday">공휴일 지정</label>
        </div>
        <button class="add-btn" onclick="addEvent()">저장</button>
        <div onclick="closeAll()" style="text-align:center; margin-top:10px; color:#aaa; cursor:pointer; font-size:13px;">닫기</div>
    </div>

    <div id="pattern-modal" class="modal">
        <h3 style="text-align: center; color: var(--blue);">근무 패턴 적용</h3>
        <div style="margin-bottom: 10px;">시작일: <input type="number" id="p-day" value="1" min="1" max="31" style="width: 40px;">일</div>
        <select id="p-idx" style="width: 100%; padding: 10px; margin-bottom: 15px;">
            <option value="0">주(1)-주-야-숙-비-비-야-숙</option>
            <option value="2">야(3)-숙-비-비-야-숙-주-주</option>
        </select>
        <button class="add-btn" style="background:var(--blue);" onclick="applyPattern()">패턴 적용</button>
        <div onclick="closeAll()" style="text-align:center; margin-top:10px; color:#aaa; cursor:pointer;">취소</div>
    </div>

    <div id="yearly-modal" class="modal" style="display: none; flex-direction: column;">
        <h2 style="text-align: center; color: var(--blue); margin-top: 0;"><span id="yearly-title"></span>년 일정</h2>
        <div id="yearly-list-container" style="flex: 1; overflow-y: auto; padding: 10px; background: #f9f9f9; border-radius: 10px;"></div>
        <button onclick="closeAll()" style="width: 100%; padding: 12px; margin-top: 10px; border: none; background: var(--pink); color: white; border-radius: 8px; font-weight: bold;">닫기</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const bdbConfig = { apiKey: "AIzaSyCjKNiwIuWn1-MhAgsIRz1C5FCa7NTy_5o", authDomain: "backgoon-811dc.firebaseapp.com", projectId: "backgoon-811dc", storageBucket: "backgoon-811dc.firebasestorage.app", messagingSenderId: "275172993103", appId: "1:275172993103:web:e001d6487f8429d736a23a" };
    const app = initializeApp(bdbConfig);
    const db = getFirestore(app);

    let currentYear = new Date().getFullYear(), currentMonth = new Date().getMonth();
    let data = {}, selectedDate = "", selectedColor = "#ffdce0", memoTimer, editIndex = null;
    const cycle = ["주", "주", "야", "숙", "비", "비", "야", "숙"];
    const cycleColors = { "주": "#e3f2fd", "야": "#ede7f6", "숙": "#fff9c4", "비": "#e8f5e9" };

    onSnapshot(doc(db, "work_planner", "data"), (snap) => { if (snap.exists()) { data = snap.data(); renderCalendar(); } });
    onSnapshot(doc(db, "work_planner", "memo"), (snap) => { if (snap.exists() && document.activeElement.id !== 'memo-area') document.getElementById('memo-area').value = snap.data().text || ""; });

    async function renderCalendar() {
        const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
        document.getElementById('display-year').innerText = currentYear;
        document.getElementById('month-display').innerText = `${currentMonth + 1}월`;

        const firstDay = new Date(currentYear, currentMonth, 1).getDay(), lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
        ['일','월','화','수','목','금','토'].forEach(d => grid.innerHTML += `<div class="day-header">${d}</div>`);
        for(let i=0; i<firstDay; i++) grid.innerHTML += `<div class="day"></div>`;

        const now = new Date();
        for(let d=1; d<=lastDate; d++) {
            const dateStr = `${currentYear}-${currentMonth+1}-${d}`, dayOfWeek = new Date(currentYear, currentMonth, d).getDay();
            const events = data[dateStr] || [], isHoliday = events.find(ev => ev.isHoliday);
            let dayClass = (dayOfWeek === 0 || isHoliday) ? "day sun" : (dayOfWeek === 6 ? "day sat" : "day");
            if (currentYear === now.getFullYear() && currentMonth === now.getMonth() && d === now.getDate()) dayClass += " today";

            const eventHtml = events.filter(ev => !ev.isHoliday).map(ev => `<span class="event-tag ${ev.isWork?'work-tag':''}" style="background-color:${ev.color}">${ev.text}</span>`).join('');
            grid.innerHTML += `<div class="${dayClass}" ondblclick="openModal('${dateStr}')"><span class="date-num">${d}</span>${isHoliday?`<span class="holiday-label">${isHoliday.text}</span>`:''}<div class="event-container">${eventHtml}</div></div>`;
        }
    }

    window.openModal = (d) => {
        selectedDate = d; editIndex = null; document.getElementById('event-input').value = '';
        document.getElementById('modal-date-display').innerText = d;
        document.getElementById('modal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
        window.updateModalList();
    };

    window.updateModalList = () => {
        const div = document.getElementById('modal-list'); div.innerHTML = '';
        (data[selectedDate] || []).forEach((ev, i) => {
            div.innerHTML += `<div style="display:flex; justify-content:space-between; padding:5px; background:${ev.color}; margin-bottom:3px; border-radius:5px;">
                <span onclick="prepareEdit(${i})">${ev.isWork?'[근무]':''} ${ev.text}</span>
                <button onclick="deleteEvent(${i})" style="border:none; background:none; cursor:pointer;">&times;</button></div>`;
        });
    };

    window.addEvent = async () => {
        const val = document.getElementById('event-input').value; if (!val) return;
        if (!data[selectedDate]) data[selectedDate] = [];
        const ev = { text: val, color: selectedColor, isHoliday: document.getElementById('is-holiday').checked, isWork: false };
        if (editIndex !== null) data[selectedDate][editIndex] = ev; else data[selectedDate].push(ev);
        await setDoc(doc(db, "work_planner", "data"), data); window.closeAll();
    };

    window.applyPattern = async () => {
        const startDay = parseInt(document.getElementById('p-day').value), startIdx = parseInt(document.getElementById('p-idx').value);
        const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
        for (let d = startDay, idx = startIdx; d <= lastDate; d++, idx++) {
            const ds = `${currentYear}-${currentMonth+1}-${d}`;
            data[ds] = (data[ds] || []).filter(e => !e.isWork);
            const type = cycle[idx % 8];
            data[ds].unshift({ text: type, color: cycleColors[type], isWork: true, isHoliday: false });
        }
        await setDoc(doc(db, "work_planner", "data"), data); window.closeAll();
    };

    window.openYearlyView = () => {
        const container = document.getElementById('yearly-list-container'); container.innerHTML = '';
        document.getElementById('yearly-title').innerText = currentYear;
        for (let m = 1; m <= 12; m++) {
            let mHtml = '';
            Object.keys(data).forEach(date => {
                const [y, mm, d] = date.split('-').map(Number);
                if (y === currentYear && mm === m) data[date].forEach(ev => mHtml += `<div style="font-size:13px; padding:3px;">${d}일: ${ev.text}</div>`);
            });
            if (mHtml) container.innerHTML += `<div style="margin-top:10px; font-weight:bold; color:var(--pink);">${m}월</div>` + mHtml;
        }
        document.getElementById('yearly-modal').style.display = 'flex';
        document.getElementById('overlay').style.display = 'block';
    };

    window.closeAll = () => { 
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); 
        document.getElementById('overlay').style.display = 'none';
        document.querySelector('.memo-container').classList.remove('active');
    };

    window.openPatternModal = () => { document.getElementById('pattern-modal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; };
    window.deleteEvent = async (i) => { data[selectedDate].splice(i, 1); await setDoc(doc(db, "work_planner", "data"), data); window.updateModalList(); };
    window.prepareEdit = (i) => { const ev = data[selectedDate][i]; document.getElementById('event-input').value = ev.text; document.getElementById('is-holiday').checked = ev.isHoliday; editIndex = i; };
    window.selectColor = (c, el) => { selectedColor = c; document.querySelectorAll('.color-btn').forEach(b => b.style.border = 'none'); el.style.border = '2px solid #333'; };
    window.changeMonth = (n) => { currentMonth += n; if (currentMonth < 0) { currentMonth = 11; currentYear--; } else if (currentMonth > 11) { currentMonth = 0; currentYear++; } renderCalendar(); };
    window.goToday = () => { const n = new Date(); currentYear = n.getFullYear(); currentMonth = n.getMonth(); renderCalendar(); };
    window.toggleMemo = (e) => { if (window.innerWidth <= 768) { document.querySelector('.memo-container').classList.toggle('active'); document.getElementById('overlay').style.display = document.querySelector('.memo-container').classList.contains('active') ? 'block' : 'none'; } };

    document.getElementById('memo-area').addEventListener('input', (e) => { clearTimeout(memoTimer); memoTimer = setTimeout(() => setDoc(doc(db, "work_planner", "memo"), { text: e.target.value }), 800); });
    renderCalendar();
</script>
</body>
</html>
